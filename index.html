<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="LernHub Familie Grimm">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="css/app.css">
  <title>LernHub Familie Grimm</title>
</head>
<body>
  <!-- Home Screen -->
  <div id="home">
    <header>
      <h1>LernHub Familie Grimm</h1>
    </header>
    <main id="module-grid"></main>
  </div>

  <!-- Module View (hidden by default) -->
  <div id="module-view" class="hidden">
    <div id="module-topbar">
      <button id="back-btn" aria-label="Zurück">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
        Zurück
      </button>
      <span id="module-title"></span>
    </div>
    <iframe id="module-frame" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox" title="Lernmodul"></iframe>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
