let currentSection = 'ernaehrung';
let sectionState = {};

function initState(key) {
  if (!sectionState[key]) sectionState[key] = {current: 0, score: 0, answered: []};
}

function showSection(key) {
  currentSection = key;
  initState(key);
  const tabs = document.querySelectorAll('.tab');
  const keys = Object.keys(sections);
  tabs.forEach((t,i) => t.classList.toggle('active', keys[i] === key));
  render();
}

function render() {
  const s = sections[currentSection];
  const st = sectionState[currentSection];
  const el = document.getElementById('content');

  if (st.current >= s.questions.length) {
    const pct = Math.round(st.score / s.questions.length * 100);
    let icon = pct === 100 ? '🎉' : pct >= 60 ? '👏' : '💪';
    el.innerHTML = `
      <div class="card" style="text-align:center;padding:40px 20px">
        <div style="font-size:48px;margin-bottom:12px">${icon}</div>
        <h2>${pct === 100 ? 'Perfekt!' : pct >= 60 ? 'Gut gemacht!' : 'Weiter üben!'}</h2>
        <p style="color:#64748b;margin:8px 0 20px">${st.score} von ${s.questions.length} richtig (${pct}%)</p>
        <button class="btn" onclick="resetSection()">Nochmal</button>
      </div>`;
    return;
  }

  const q = s.questions[st.current];
  el.innerHTML = `
    <div class="card">
      <div class="info">${s.info}</div>
    </div>
    <div class="score-bar">
      <span>${s.title}</span>
      <span>Frage ${st.current+1}/${s.questions.length} · <span class="score-val">${st.score} richtig</span></span>
    </div>
    <div class="progress-dots">${s.questions.map((_,i) => {
      let cls = i < st.current ? (st.answered[i] ? 'done' : 'wrong-dot') : i === st.current ? 'current' : '';
      return `<div class="dot ${cls}"></div>`;
    }).join('')}</div>
    <div class="card">
      <div class="question">${q.q}</div>
      <div class="options">${q.opts.map((o,i) => `<button class="opt" onclick="answer(${i})">${o}</button>`).join('')}</div>
      <div class="feedback" id="fb"></div>
    </div>`;
}

function answer(idx) {
  const s = sections[currentSection];
  const st = sectionState[currentSection];
  const q = s.questions[st.current];
  const correct = idx === q.correct;
  if (correct) st.score++;
  st.answered.push(correct);

  document.querySelectorAll('.opt').forEach((o,i) => {
    o.classList.add('disabled');
    if (i === q.correct) o.classList.add('correct');
    if (i === idx && !correct) o.classList.add('wrong');
  });
  const fb = document.getElementById('fb');
  fb.className = `feedback show ${correct ? 'correct' : 'wrong'}`;
  fb.textContent = correct ? '✓ Richtig! ' + q.explain : '✗ ' + q.explain;

  setTimeout(() => { st.current++; render(); }, 1800);
}

function resetSection() {
  sectionState[currentSection] = {current:0, score:0, answered:[]};
  render();
}

showSection('ernaehrung');
</script>
</body>
</html>
