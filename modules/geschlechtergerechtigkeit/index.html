{
  id: 4, title: 'Wenn Verunsicherung kippt', subtitle: 'Von Frust zu Extremismus',
  goal: 'Verstehen, wie berechtigte Verunsicherung in Radikalisierung m\u00fcnden kann, und lernen, Warnsignale zu erkennen.',
  blocks: [
    { type:'label', emoji:'\uD83D\uDDFA\uFE0F', text:'Einstieg: Die Verunsicherungs-Landkarte' },
    { type:'activity', title:'Gedankenexperiment (10 Min)', html:'<p>Stellt euch eine Landkarte vor: In der Mitte steht <strong>"ICH"</strong>. Welche Bereiche drumherum machen euch manchmal unsicher? Schule, Freundschaften, Aussehen, Zukunft, Familie, Social Media... Besprecht, was davon am meisten besch\u00e4ftigt.</p>' },
    { type:'convo', html:'<strong>Gespr\u00e4chsimpuls:</strong> Unsicherheit ist normal. Jeder Mensch kennt sie. Die Frage ist: Was machst du mit dem Gef\u00fchl? Und wem vertraust du, wenn du nach Antworten suchst?' },
    { type:'label', emoji:'\uD83D\uDCDA', text:'Wissensblock: Der Weg von Unsicherheit zu Extremismus' },
    { type:'collapsible', title:'Warum gerade junge M\u00e4nner?', html:`<p>Es gibt ein echtes Paradox (ein scheinbarer Widerspruch) in unserer Gesellschaft: Einerseits sind Frauen heute formal gleichberechtigt, und das ist gut so. Andererseits haben viele junge M\u00e4nner das Gef\u00fchl, dass ihnen niemand sagt, was ihre Rolle eigentlich sein soll.</p>
<p>Die alten Modelle ("Mann geht arbeiten, ist stark, zeigt keine Gef\u00fchle") funktionieren nicht mehr richtig. Aber neue Modelle sind noch nicht klar. Es gibt eine echte "M\u00e4nnlichkeitsl\u00fccke" \u2014 nicht weil M\u00e4nnlichkeit abgeschafft wurde, sondern weil die alten Bilder nicht mehr tragen und niemand etwas Neues anbietet. <strong>In dieses Vakuum sto\u00dfen die Bewegungen aus Session 3.</strong></p>
<p>Dazu kommen reale Probleme \u2014 hier sind die Zahlen:</p>
<ul><li><strong>Suizid:</strong> In Deutschland sterben jedes Jahr etwa 9.000 bis 10.000 Menschen durch Suizid. Rund <strong>75% davon sind M\u00e4nner</strong>. Bei jungen M\u00e4nnern zwischen 15 und 24 ist die Suizidrate <strong>drei- bis viermal so hoch</strong> wie bei gleichaltrigen Frauen. Es gibt dabei ein sogenanntes "Gender-Paradox" (Geschlechter-Paradox): M\u00e4dchen und Frauen versuchen h\u00e4ufiger, sich das Leben zu nehmen \u2014 aber M\u00e4nner sterben h\u00e4ufiger daran, weil sie oft extremere Methoden w\u00e4hlen. Der Grund daf\u00fcr liegt unter anderem darin, dass M\u00e4nner seltener Hilfe suchen.</li>
<li><strong>Bildung:</strong> In Deutschland sind 55-57% der Abiturienten M\u00e4dchen. Etwa 6-7% der Jungen verlassen die Schule ganz ohne Abschluss, bei M\u00e4dchen sind es nur 4-5%. Jungen landen doppelt so h\u00e4ufig in der Sonderp\u00e4dagogik. Im PISA-Lesetest liegen Jungen im Schnitt 25-30 Punkte hinter M\u00e4dchen \u2014 das entspricht etwa einem halben Schuljahr. Und: In Deutschland werden Kinder mit 10-12 Jahren auf verschiedene Schultypen aufgeteilt (Gymnasium, Realschule usw.) \u2014 zu einem Zeitpunkt, an dem Jungen im Durchschnitt sp\u00e4ter reifen als M\u00e4dchen.</li>
<li><strong>Hilfe suchen:</strong> Junge M\u00e4nner suchen sich etwa halb so h\u00e4ufig therapeutische Hilfe wie junge Frauen. Barrieren sind: Stigma (Schande), m\u00e4nnliche Normen ("Ich komm alleine klar"), und die Tatsache, dass Jungen ihre Probleme oft als Wut oder Aggression \u00e4u\u00dfern \u2014 nicht als "klassische" Depression. Dadurch werden sie seltener erkannt.</li>
<li><strong>Einsamkeit:</strong> Der Anteil der M\u00e4nner ohne engen Freund stieg von 3% (1990) auf 15% (2021). Richard Reeves hat das in seinem Buch "Of Boys and Men" dokumentiert \u2014 eine echte Krise, die kaum jemand sieht.</li></ul>
<p><strong>Das sind reale Probleme, die ernst genommen werden m\u00fcssen.</strong> Die Frage ist nur: Wer bietet die L\u00f6sungen an? Und wohin f\u00fchren diese L\u00f6sungen?</p>` },
    { type:'collapsible', title:'Pfad 1: Der Leistungs-Pfad \u2014 Von Motivation zu Verachtung', html:`<p><strong>Stell dir vor, es gibt einen Jungen namens Max.</strong> Max ist 14, clever und ehrgeizig. Er will etwas aus seinem Leben machen. Er schaut YouTube-Videos \u00fcber Motivation und Disziplin. Soweit alles gut.</p>
<p>Dann f\u00e4ngt der Algorithmus an: Nach den Motivationsvideos kommen Videos \u00fcber "Hustle Culture" \u2014 Luxusautos, Dubai-Apartments, S\u00e4tze wie "Schlaf ist f\u00fcr Verlierer." Max denkt: "Ja, ich will auch so leben."</p>
<p>Max lernt, dass "echte" M\u00e4nner Million\u00e4re sind. Er arbeitet hart, aber der Erfolg kommt nicht \u2014 er ist 14! Statt zu erkennen, dass die Versprechen unrealistisch waren, lernt er von Andrew Tate und \u00e4hnlichen Influencern: "Die anderen sind schuld." Frauen wollen nur dein Geld. Die Gesellschaft h\u00e4lt dich klein. Die "Eliten" wollen nicht, dass du Erfolg hast.</p>
<p>Max beginnt, alle Menschen in "High Value" (wertvoll) und "Low Value" (wertlos) einzuteilen \u2014 sich selbst eingeschlossen. Wenn er nicht erfolgreich ist, ist er ein "Low Value Male". Wenn ein M\u00e4dchen ihn nicht mag, liegt es daran, dass er noch nicht genug "grindet".</p>
<p>Das Ergebnis: <strong>Verachtung f\u00fcr andere und Selbsthass</strong>, wenn er seine eigenen unrealistischen Ma\u00dfst\u00e4be nicht erreicht. Und Max merkt nicht, dass er einem Mann Geld bezahlt (f\u00fcr "Kurse"), der genau daran verdient, dass Max sich minderwertig f\u00fchlt.</p>` },
    { type:'collapsible', title:'Pfad 2: Der K\u00f6rper-Pfad \u2014 Von Fitness zu Selbsthass', html:`<p><strong>Stell dir vor, es gibt einen Jungen namens Leon.</strong> Leon ist 13 und etwas schmaler als seine Klassenkameraden. Er will fitter werden \u2014 ein v\u00f6llig normaler, guter Wunsch.</p>
<p>Leon f\u00e4ngt an, Fitnessvideos zu schauen. Aber der Algorithmus zeigt ihm schnell Influencer mit K\u00f6rpern, die nur mit Steroiden m\u00f6glich sind \u2014 aber behaupten, "nat\u00fcrlich" zu sein. Leon vergleicht sich und denkt: "Warum sehe ich nach 3 Monaten Training nicht so aus?"</p>
<p>Dann st\u00f6\u00dft er auf Looksmaxxing-Content. Dort lernt er W\u00f6rter wie "Jawline" (Kieferlinie), "Hunter Eyes" (eine bestimmte Augenform, die als attraktiv gilt) und "Canthal Tilt" (der Winkel der Augen). Pl\u00f6tzlich sieht er sein eigenes Gesicht nicht mehr als "mein Gesicht", sondern als eine Sammlung von Merkmalen, die bewertet werden k\u00f6nnen. Er f\u00e4ngt an zu "mewing" \u2014 obwohl es nicht funktioniert. Er \u00fcberlegt, ob Bonesmashing hilft \u2014 obwohl es gef\u00e4hrlich ist.</p>
<p>Von dort ist es nicht weit zu Red-Pill-Content, der "erkl\u00e4rt": "Frauen wollen nur M\u00e4nner mit perfekter Jawline und Geld. Wenn du die nicht hast, hast du verloren." Die Black Pill flüstert: "Du bist genetisch minderwertig. Es lohnt sich nicht mal, es zu versuchen."</p>
<p>Das Ergebnis: <strong>Leons K\u00f6rper wird zum Feind</strong>, und M\u00e4dchen werden zur Jury, deren Urteil er f\u00fcrchtet. Vielleicht denkt er sogar \u00fcber SARMs nach \u2014 und riskiert, f\u00fcr immer kleiner zu bleiben, als er h\u00e4tte werden k\u00f6nnen.</p>` },
    { type:'collapsible', title:'Pfad 3: Der Intellektuellen-Pfad \u2014 Von Neugier zu Arroganz', html:`<p><strong>Stell dir vor, es gibt einen Jungen namens Finn.</strong> Finn ist 15, liest gerne und denkt viel nach. Er sucht nach Sinn und Orientierung. Auf YouTube findet er Jordan Peterson, der sagt: "\u00dcbernimm Verantwortung f\u00fcr dein Leben." "Sag die Wahrheit." "R\u00e4um dein Zimmer auf."</p>
<p>Das klingt klug und hilfreich \u2014 und ist es teilweise auch. Finn f\u00fchlt sich verstanden. Hier ist endlich jemand, der Jungs ernst nimmt!</p>
<p>Aber dann verschiebt sich die Botschaft \u2014 langsam, Schritt f\u00fcr Schritt: "Geschlechterhierarchien sind nat\u00fcrlich", "Hummer beweisen, dass Dominanzhierarchien biologisch sind" (eine Behauptung, die Biologen widerlegt haben), "Feminismus hat die Gesellschaft zerst\u00f6rt." Der Algorithmus schl\u00e4gt Ben Shapiro vor, dann Dave Rubin, dann immer radikalere Stimmen.</p>
<p>Finn f\u00fchlt sich intellektuell \u00fcberlegen, weil er die "Wahrheit" erkannt hat. Er sagt: "Ich bin kein Frauenfeind \u2014 ich bin einfach rational." Er verwendet Begriffe wie "postmoderner Neo-Marxismus" (Petersons Lieblingsfeindbild), ohne wirklich zu wissen, was das bedeutet.</p>
<p>Das Ergebnis: <strong>Finn verwechselt Arroganz mit Intelligenz</strong> und h\u00f6rt auf, andere Perspektiven ernst zu nehmen. Wer ihm widerspricht, "versteht es einfach nicht."</p>` },
    { type:'collapsible', title:'Pfad 4: Der Humor-Pfad \u2014 Von Memes zu Menschenverachtung', html:`<p><strong>Stell dir vor, es gibt einen Jungen namens Tim.</strong> Tim ist 13 und hat einen gro\u00dfen Humor \u2014 er liebt Memes. Auf einem Discord-Server f\u00fcr sein Lieblingsspiel teilen Leute lustige Bilder. Tim lacht \u00fcber ein Meme, das sich \u00fcber "moderne Frauen" lustig macht. Dann noch eins. Die Memes werden extremer, aber Tim lacht weiter \u2014 es ist ja nur Spa\u00df.</p>
<p>Dann postet jemand: "Frauen sind wie Parkpl\u00e4tze \u2014 die guten sind besetzt und der Rest ist behindert." Tim wei\u00df, dass das eigentlich nicht okay ist. Aber alle lachen. Und wer nicht lacht, wird als "cringe" markiert und aus dem Server gemobbt.</p>
<p>Das ist "Schr\u00f6dingers Ironie": Wenn du einverstanden bist, war es ernst gemeint. Wenn du Einw\u00e4nde hast, war es "nur ein Witz." Memes senken die psychologische Widerstandskraft \u2014 \u00e4hnlich wie ein Koch, der Gift in kleinen Dosen unter leckeres Essen mischt.</p>
<p>Nach ein paar Monaten teilt Tim auf Discord Bilder, die er vor einem Jahr noch absto\u00dfend gefunden h\u00e4tte. Er merkt nicht, dass sich sein Kompass verschoben hat, weil alles in Ironie verpackt war.</p>
<p>Das Ergebnis: <strong>Tim hat keine klare Position mehr</strong>, weil er gelernt hat, dass alles "nur ein Witz" ist \u2014 auch Frauenhass, Rassismus und Gewalt.</p>` },
    { type:'collapsible', title:'Pfad 5: Der Traditions-Pfad \u2014 Von Sehnsucht zu Starrheit', html:`<p><strong>Stell dir vor, es gibt einen Jungen namens Paul.</strong> Pauls Eltern haben sich getrennt, als er 10 war. Er sehnt sich nach Klarheit, Ordnung, einer Familie, die zusammenh\u00e4lt.</p>
<p>Er findet Tradwife-Content \u2014 sch\u00f6n inszenierte Videos von Familien, in denen alles perfekt aussieht. Die Frau kocht, der Mann besch\u00fctzt, die Kinder spielen im Garten. Paul denkt: "Das ist es, was ich mir w\u00fcnsche."</p>
<p>Von dort f\u00fchrt der Algorithmus ihn zu Content, der erkl\u00e4rt: "Fr\u00fcher war alles besser, weil Frauen ihre Rolle kannten." Dann: "Der Feminismus hat die Familie zerst\u00f6rt." Dann: "Die Gesellschaft ist zu weiblich geworden."</p>
<p>Das f\u00fchlt sich warm und sicher an. Aber: Die idealisierte Vergangenheit, die gezeigt wird, hat es nie gegeben. In den "perfekten" 1950er-Jahren durften Frauen kein eigenes Bankkonto er\u00f6ffnen, Gewalt in der Ehe war legal, und M\u00e4nner, die "anders" waren, wurden bestraft. Die "klaren Rollen" bedeuten in der Praxis: Frauen verlieren ihre Freiheit, M\u00e4nner werden auf die Versorger-Rolle reduziert, und wer nicht ins Bild passt, wird ausgeschlossen.</p>
<p>Das Ergebnis: <strong>Rigidit\u00e4t statt Stabilit\u00e4t</strong> (also Starrheit statt echter Sicherheit) \u2014 und Feindseligkeit gegen alle, die anders leben wollen.</p>` },
    { type:'collapsible', title:'Was alle Pfade gemeinsam haben', html:`<p>Egal welchen Weg jemand nimmt \u2014 am Ende landen viele an einem \u00e4hnlichen Ort:</p>
<ul><li>Ein Weltbild, in dem Geschlechter <strong>gegeneinander</strong> stehen statt miteinander</li>
<li>Verachtung f\u00fcr Schw\u00e4che (bei sich selbst und bei anderen)</li>
<li>Misstrauen gegen "das System", Medien, Bildung, Institutionen</li>
<li>Das Gef\u00fchl, einer erleuchteten Minderheit anzugeh\u00f6ren ("Ich habe die Wahrheit erkannt, die anderen sind NPCs")</li>
<li>Und oft: <strong>Einsamkeit, verkleidet als Unabh\u00e4ngigkeit</strong></li></ul>
<p>Das ist das Tragische: Diese Bewegungen versprechen Gemeinschaft \u2014 aber sie f\u00fchren in die Isolation. Sie versprechen St\u00e4rke \u2014 aber sie machen abh\u00e4ngig. Sie versprechen Antworten \u2014 aber sie verhindern echtes Verstehen.</p>` },
    { type:'collapsible', title:'Der politische Kontext \u2014 was das f\u00fcr Deutschland bedeutet', html:`<p>Jetzt wird es politisch \u2014 und das ist wichtig, auch wenn ihr euch normalerweise nicht so f\u00fcr Politik interessiert.</p>
<p>Erstmal: Was ist die <strong>AfD</strong>? Die "Alternative f\u00fcr Deutschland" ist eine Partei, die 2013 gegr\u00fcndet wurde. Teile der AfD werden vom Verfassungsschutz als "gesichert rechtsextremistisch" eingestuft. Das bedeutet: Beh\u00f6rden sehen in Teilen dieser Partei eine Bedrohung f\u00fcr die Demokratie.</p>
<p>Jetzt die Zahlen, die zeigen, warum das f\u00fcr dieses Thema relevant ist:</p>
<ul><li>Bei der <strong>Europawahl 2024</strong> war die AfD die st\u00e4rkste Partei bei W\u00e4hlern zwischen 16 und 24 Jahren.</li>
<li>In <strong>Th\u00fcringen</strong> (Landtagswahl September 2024) bekam die AfD rund 36% der Stimmen bei unter 30-J\u00e4hrigen.</li>
<li>Besonders auff\u00e4llig: Es gibt einen riesigen <strong>Geschlechter-Unterschied</strong>: Junge M\u00e4nner w\u00e4hlten 10-15 Prozentpunkte h\u00e4ufiger AfD als junge Frauen. Das hei\u00dft: Ein Junge in deinem Alter w\u00e4hlt sp\u00e4ter deutlich wahrscheinlicher AfD als ein M\u00e4dchen in deinem Alter.</li></ul>
<p>Warum? Weil die AfD <strong>exakt dieselben Mechanismen</strong> nutzt wie das M\u00e4nnlichkeits-\u00d6kosystem:</p>
<ul><li><strong>Echte Probleme, falsche Antworten:</strong> "Jobs werden weniger, Mieten steigen" \u2014 alles real. Die AfD-Antwort: "Die Ausl\u00e4nder sind schuld."</li>
<li><strong>M\u00e4nnlichkeit als politisches Versprechen:</strong> Die AfD inszeniert sich als Partei der "echten M\u00e4nner" \u2014 gegen "Genderideologie" (das Wort benutzen sie abwertend), gegen "woke Eliten" (gemeint sind alle, die sich f\u00fcr Gleichberechtigung einsetzen).</li>
<li><strong>Provokation als Markenzeichen:</strong> "Das wird man ja wohl noch sagen d\u00fcrfen" \u2014 derselbe Mechanismus wie die Meme-Kultur: Provozieren und dann behaupten, man werde "zensiert".</li>
<li><strong>Die Spirale von Online zu Offline:</strong> Studien zeigen, dass der Konsum von Manosphere-Content einer der st\u00e4rksten Pr\u00e4diktoren (Vorhersage-Faktoren) f\u00fcr rechtsextremes Wahlverhalten bei jungen M\u00e4nnern ist.</li></ul>
<p>Das hei\u00dft nicht, dass jeder, der ein Sigma-Male-Meme lustig findet, automatisch rechtsextrem wird. Aber die Pipeline ist real \u2014 und sie ist kein Zufall.</p>` },
    { type:'collapsible', title:'Internationale Dimension', html:`<p>Das ist kein deutsches Problem. Es ist ein weltweites Muster:</p>
<ul><li>In den <strong>USA</strong> w\u00e4hlen junge M\u00e4nner zunehmend republikanisch, w\u00e4hrend junge Frauen zunehmend demokratisch w\u00e4hlen \u2014 die Kluft zwischen den Geschlechtern war bei der Wahl 2024 so gro\u00df wie nie.</li>
<li>In <strong>S\u00fcdkorea</strong> gibt es eine massive antifeministische Bewegung unter jungen M\u00e4nnern \u2014 dort wird Feminismus von vielen jungen M\u00e4nnern als pers\u00f6nliche Bedrohung empfunden.</li>
<li>In <strong>Italien, Frankreich, Schweden</strong> dasselbe Muster: Junge M\u00e4nner tendieren st\u00e4rker zu rechtspopulistischen Parteien.</li></ul>
<p>Die Verunsicherung junger M\u00e4nner ist global \u2014 und die Antworten, die sie im Internet finden, sind es auch. Andrew Tate hat Fans von Brasilien bis Indonesien. Looksmaxxing-Content sieht in Japan \u00e4hnlich aus wie in Deutschland.</p>` },
    { type:'quote', text:'Verunsicherung ist menschlich. Die Probleme, die junge M\u00e4nner haben, sind real. Aber wer dir sagt, dass andere Menschen schuld an deinen Problemen sind \u2014 egal ob Frauen, Migranten, "die Elite" oder "das System" \u2014 der will dich nicht st\u00e4rken. Der will dich benutzen. F\u00fcr Klicks. F\u00fcr Geld. F\u00fcr W\u00e4hlerstimmen.' },
    { type:'label', emoji:'\u26A0\uFE0F', text:'Aktivit\u00e4t: Warnsignale erkennen' },
    { type:'card', html:`<p>Radikalisierung passiert schleichend. Deshalb ist es wichtig, die Warnsignale zu kennen \u2014 bei dir selbst und bei Freunden. Hier sind die drei Bereiche, auf die ihr achten k\u00f6nnt:</p>` },
    { type:'collapsible', title:'Teil 1: Warnsignale im Verhalten', html:`<p>Achtet auf diese Muster \u2014 bei euch selbst oder bei Freunden:</p>
<ul><li><strong>"Alle Frauen sind so und so" / "Alle M\u00e4nner sind so und so"</strong> \u2014 Pauschale Aussagen \u00fcber ganze Gruppen sind fast immer ein Warnzeichen. Die Welt ist komplizierter als das.</li>
<li><strong>"Die Wahrheit wird unterdr\u00fcckt"</strong> \u2014 Wenn jemand glaubt, nur er und seine Online-Community kennen "die Wahrheit", w\u00e4hrend alle anderen "schlafen" oder "blind" sind \u2014 das ist Verschw\u00f6rungsdenken.</li>
<li><strong>"Ich bin ein Opfer des Systems"</strong> \u2014 Opfer-Sein als dauerhaftes Selbstbild, nicht als vor\u00fcbergehende Situation.</li>
<li><strong>"Nur wir verstehen die Realit\u00e4t"</strong> \u2014 Abschottung von allen, die anders denken.</li>
<li><strong>"Das darf man ja nicht mehr sagen"</strong> \u2014 Provokation als Selbstzweck. Oft ist die eigentliche Aussage: "Ich will menschenverachtende Dinge sagen, ohne Widerspruch zu bekommen."</li>
<li><strong>Zunehmendes Misstrauen</strong> gegen\u00fcber Freunden, Familie, Lehrern \u2014 "Die verstehen mich nicht."</li>
<li><strong>R\u00fcckzug</strong> in eine bestimmte Online-Community, w\u00e4hrend "echte" Freundschaften abnehmen.</li>
<li><strong>Das Gef\u00fchl, "aufgewacht" zu sein</strong>, w\u00e4hrend alle anderen "schlafen" \u2014 das ist genau das, was "red-pilled" bedeutet, und es ist ein Hauptmerkmal jeder Radikalisierung.</li></ul>` },
    { type:'collapsible', title:'Teil 2: Warnsignale im Sprachgebrauch', html:`<p>Neue W\u00f6rter k\u00f6nnen ein Signal sein. Nicht jedes Wort ist automatisch ein Alarmzeichen \u2014 aber wenn pl\u00f6tzlich viele davon auftauchen, lohnt es sich, genauer hinzuschauen.</p>
<p><strong>Aus der Manosphere:</strong></p>
<ul><li>"alpha", "beta", "sigma" \u2014 die angebliche M\u00e4nnerhierarchie</li>
<li>"high value", "low value" \u2014 Menschen als Produkte mit Marktwert</li>
<li>"hypergamy", "the wall", "body count" \u2014 frauenfeindliche Konzepte (Erkl\u00e4rungen findest du in Session 3)</li></ul>
<p><strong>Aus der Meme-/Online-Kultur:</strong></p>
<ul><li>"based", "cringe" \u2014 Bewertungssystem (gut/peinlich)</li>
<li>"red-pilled", "blue-pilled" \u2014 "aufgewacht" vs. "naive Schlafschafe"</li>
<li>"cope", "copium" \u2014 "Du redest dir was ein"</li>
<li>"NPC" \u2014 "Du bist ein Roboter, der nicht selbst denken kann"</li>
<li>"the matrix", "clown world" \u2014 die Idee, die ganze Gesellschaft sei eine L\u00fcge</li></ul>
<p><strong>Aus der Grindset-Kultur:</strong></p>
<ul><li>"grindset", "no excuses", "level up" \u2014 klingt motivierend, kann aber ein Zeichen f\u00fcr toxische Leistungsideologie sein</li></ul>
<p>Wenn du oder ein Freund pl\u00f6tzlich diese Sprache benutzt, ist das kein <em>Beweis</em> f\u00fcr Radikalisierung \u2014 aber ein Signal, genauer hinzuschauen. Frag: "Wo hast du das Wort aufgeschnappt? Was genau meinst du damit?"</p>` },
    { type:'collapsible', title:'Teil 3: Was tun, wenn ein Freund abdriftet?', html:`<p>Das ist vielleicht der wichtigste Teil dieser ganzen Session. Denn: Wenn ein Freund in diese Richtung driftet, bist <em>du</em> m\u00f6glicherweise die letzte Br\u00fccke zur Normalit\u00e4t.</p>
<p>Hier sind ganz konkrete Tipps:</p>
<ul><li><strong>1. Nicht angreifen, sondern nachfragen:</strong> Statt "Du spinnst ja!" lieber: "Woher hast du das? Erkl\u00e4r mir das mal genauer." Fragen sind m\u00e4chtiger als Belehrungen. Wenn jemand seine Ideen laut erkl\u00e4ren muss, merkt er manchmal selbst, dass sie L\u00fccken haben.</li>
<li><strong>2. Die Person von der Idee trennen:</strong> "Ich mag dich. Du bist mein Freund. Aber was du gerade sagst, macht mir Sorgen." Das ist schwer zu sagen \u2014 aber es zeigt, dass du den Menschen nicht aufgibst, auch wenn du seine Ideen ablehnst.</li>
<li><strong>3. Nicht aufgeben, aber auch deine Grenzen kennen:</strong> Radikalisierung passiert oft, weil Menschen sich isoliert f\u00fchlen. Kontakt abbrechen best\u00e4tigt ihr Narrativ ("Siehst du, die verstehen mich nicht"). Aber: Du bist nicht f\u00fcr seine Rettung verantwortlich. Wenn es dir selbst zu viel wird, ist das okay.</li>
<li><strong>4. Konkret werden:</strong> Statt "Das stimmt nicht" lieber: "Okay, du sagst, Frauen wollen nur reiche M\u00e4nner. Aber was ist mit Mamas Freundin, die mit einem Lehrer zusammen ist? Was ist mit...?" Konkrete Beispiele aus dem echten Leben wiegen schwerer als abstrakte Gegenargumente.</li>
<li><strong>5. Hilfe holen:</strong> Wenn jemand Gewaltfantasien \u00e4u\u00dfert, sich komplett zur\u00fcckzieht, oder Suizidgedanken andeutet \u2014 <strong>sprich mit einem Erwachsenen</strong>. Das ist kein Verrat. Das ist F\u00fcrsorge. Ein guter erster Anlaufpunkt: ein Vertrauenslehrer, die Eltern, oder die Nummer gegen Kummer (116 111).</li></ul>` },
    { type:'convo', html:'<strong>Gespr\u00e4chsfrage:</strong> Was w\u00fcrdest du tun, wenn du merkst, dass ein Freund sich ver\u00e4ndert und immer extremere Dinge sagt? Was w\u00e4re der erste Satz, den du sagen w\u00fcrdest? \u00dcbt das ruhig mal laut \u2014 es ist leichter, wenn man es schon einmal ausgesprochen hat.' },
    { type:'label', emoji:'\uD83C\uDFDB\uFE0F', text:'Exkurs: Politische M\u00fcndigkeit' },
    { type:'card', html:`<p>In einer Demokratie hat jeder das Recht auf seine Meinung \u2014 auch eine unbequeme. Und: <strong>Nicht jeder, der konservative Werte hat, ist extremistisch.</strong> Nicht jeder, der sagt, dass Jungs es manchmal schwer haben, ist ein Frauenfeind. Die Grenze verl\u00e4uft nicht zwischen links und rechts, sondern zwischen <strong>differenziertem Denken und Schwarz-Wei\u00df-Denken</strong>.</p>
<p>Politische M\u00fcndigkeit bedeutet:</p>
<ul><li>Zu pr\u00fcfen, <strong>woher</strong> deine Meinung kommt (Hast du sie selbst gebildet \u2014 oder hat ein Algorithmus sie dir gef\u00fcttert?)</li>
<li>Andere Perspektiven <strong>anzuh\u00f6ren</strong>, bevor du urteilst</li>
<li>Zwischen <strong>Fakten und Gef\u00fchlen</strong> unterscheiden zu k\u00f6nnen \u2014 und beides ernst zu nehmen</li>
<li>Bereit zu sein, deine Meinung zu <strong>\u00e4ndern</strong>, wenn du neue Informationen bekommst</li>
<li>Zu erkennen, wenn jemand <strong>deine Meinung als Werkzeug benutzt</strong> \u2014 f\u00fcr Klicks, Geld oder Macht</li></ul>` },
    { type:'label', emoji:'\uD83D\uDC68\u200D\uD83D\uDC69\u200D\uD83D\uDC66', text:'Gemeinsam mit deinen Eltern' },
    { type:'convo', html:'<strong>Frag deinen Papa:</strong> Hattest du als Teenager auch manchmal das Gef\u00fchl, dass du nicht weißt, wer du sein sollst? Dass die Erwartungen von allen Seiten kamen und sich widersprochen haben? Wie bist du da rausgekommen?' },
    { type:'convo', html:'<strong>Frag deine Mama:</strong> Hast du bei Jungs oder M\u00e4nnern in deinem Umfeld schon mal gemerkt, dass sie sich radikalisiert haben oder extremer geworden sind? Was hast du beobachtet? Was h\u00e4ttest du dir gew\u00fcnscht?' },
    { type:'label', emoji:'\uD83E\uDE9E', text:'Abschluss' },
    { type:'reflect', label:'Formuliert zusammen einen Kompass-Satz, z.B.: "Wenn mir jemand sagt, wer mein Feind ist, frage ich zuerst: Was hat diese Person davon, dass ich das glaube?"' }
  ]
},
{
  id: 5, title: 'Stark auf die gute Art', subtitle: 'Gesunde M\u00e4nnlichkeit und echte Beziehungen',
  goal: 'Ein positives Bild von M\u00e4nnlichkeit entwickeln, das auf Respekt, Verantwortung und echten Verbindungen basiert.',
  blocks: [
    { type:'label', emoji:'\uD83C\uDF1F', text:'Einstieg: Der beste Mann, den ich kenne' },
    { type:'activity', title:'\u00dcbung (10 Min)', html:'<p>Jeder denkt an einen Mann (real, nicht fiktiv), den er wirklich respektiert. Das kann der Opa sein, ein Trainer, ein Lehrer, ein Nachbar. Beschreibt: Was macht ihn zu einem guten Mann? Versucht, m\u00f6glichst konkret zu sein \u2014 nicht "Er ist nett", sondern "Er hat mir zugehört, als es mir schlecht ging, ohne zu urteilen."</p>' },
    { type:'convo', html:'<strong>Gespr\u00e4chsimpuls:</strong> Tauchen in euren Beschreibungen Worte wie "reich", "stark", "dominant" auf? Oder eher "zuverl\u00e4ssig", "lustig", "h\u00f6rt zu", "fair"? Was sagt das dar\u00fcber aus, was wirklich z\u00e4hlt?' },
    { type:'label', emoji:'\uD83D\uDCAA', text:'Wissensblock: Was gesunde M\u00e4nnlichkeit bedeuten kann' },
    { type:'card', html:`<p>Es gibt nicht DIE M\u00e4nnlichkeit \u2014 und das ist eine gute Nachricht. Denn es bedeutet: Du musst nicht in eine Schablone passen.</p>
<p>M\u00e4nnlichkeit ist kein einzelner Bauplan. Die Forschung zeigt, dass "positive M\u00e4nnlichkeit" gemeinsame Merkmale hat:</p>
<ul><li><strong>Emotionale Offenheit:</strong> Wissen, was in dir vorgeht \u2014 und es benennen k\u00f6nnen.</li>
<li><strong>Verantwortung \u00fcbernehmen:</strong> Fehler zugeben k\u00f6nnen, ohne dich selbst zu zerst\u00f6ren. "Ich hab Mist gebaut" ist einer der st\u00e4rksten S\u00e4tze, die es gibt.</li>
<li><strong>F\u00fcrsorge:</strong> Sich um andere k\u00fcmmern \u2014 keine "weibliche" Eigenschaft, sondern zutiefst menschlich.</li>
<li><strong>Integrit\u00e4t:</strong> Deine Werte auch dann leben, wenn es unbequem ist \u2014 zum Beispiel, wenn alle \u00fcber jemanden lachen und du sagst: "Das ist nicht fair."</li>
<li><strong>Verbindung:</strong> Echte Freundschaften, in denen du ehrlich sein kannst \u2014 ohne Angst, als "schwach" zu gelten.</li></ul>` },
    { type:'collapsible', title:'Warum Respekt keine Einbahnstra\u00dfe ist', html:`<p>Geschlechtergerechtigkeit hei\u00dft nicht: "M\u00e4dchen sind besser als Jungs." Es hei\u00dft: <strong>Alle Menschen verdienen den gleichen Respekt, die gleichen Chancen und die gleiche Freiheit.</strong></p>
<p>Das gilt auch f\u00fcr dich. Wenn dir jemand sagt, du bist "toxisch", nur weil du ein Junge bist \u2014 dann ist das genauso unfair wie wenn jemand ein M\u00e4dchen auf ihr Aussehen reduziert. Geschlechtergerechtigkeit sch\u00fctzt alle.</p>
<p>Und: Es ist okay, manchmal verwirrt zu sein. "Ich wei\u00df nicht genau, was ich davon halten soll" ist eine v\u00f6llig legitime Position. Du musst nicht sofort f\u00fcr alles eine Meinung haben.</p>` },
    { type:'collapsible', title:'Das Patriarchat \u2014 ein System, das auch M\u00e4nner kaputt macht', html:`<p>Vielleicht hast du das Wort <strong>"Patriarchat"</strong> schon mal geh\u00f6rt \u2014 und vielleicht dachtest du: "Das ist ein Frauenthema." Aber es lohnt sich, genauer hinzuschauen, denn dieses System betrifft <em>dich</em> ganz direkt.</p>
<h4>Was ist das Patriarchat \u00fcberhaupt?</h4>
<p>Patriarchat bedeutet w\u00f6rtlich "Herrschaft des Vaters." Es beschreibt eine Gesellschaftsordnung, in der M\u00e4nner mehr Macht haben als Frauen \u2014 in der Politik, in der Wirtschaft, in Familien. Das hei\u00dft nicht, dass jeder einzelne Mann m\u00e4chtig ist. Ein armer Mann, ein einsamer Mann, ein depressiver Mann hat keine "Macht" \u2014 und trotzdem lebt er in einem System, das M\u00e4nnern als Gruppe Vorteile gibt und gleichzeitig <em>starre Erwartungen</em> an sie stellt.</p>
<h4>Wie das Patriarchat M\u00e4nnern schadet</h4>
<p>Das ist der Teil, der fast nie erz\u00e4hlt wird: Das Patriarchat ist nicht nur schlecht f\u00fcr Frauen. Es ist auch schlecht f\u00fcr M\u00e4nner. Hier ist warum:</p>
<ul><li><strong>"Echte M\u00e4nner weinen nicht"</strong> \u2014 Das Patriarchat sagt: M\u00e4nner m\u00fcssen stark und kontrolliert sein. Das Ergebnis? M\u00e4nner sterben dreimal h\u00e4ufiger durch Suizid als Frauen, weil sie gelernt haben, nicht \u00fcber Schmerz zu reden und keine Hilfe zu suchen.</li>
<li><strong>"Der Mann muss die Familie ern\u00e4hren"</strong> \u2014 Dieser Druck macht M\u00e4nner krank. Burnout, Herzinfarkte, fr\u00fcher Tod. Gleichzeitig verpasst ein Vater, der nur arbeitet, die Kindheit seiner Kinder \u2014 und das ist auch sein Verlust.</li>
<li><strong>"M\u00e4nner l\u00f6sen Probleme, sie reden nicht dar\u00fcber"</strong> \u2014 Deswegen haben viele M\u00e4nner keine engen Freundschaften. Sie sind einsam, aber sie d\u00fcrfen es nicht sagen. Die Einsamkeitskrise bei jungen M\u00e4nnern, die wir in Session 2 besprochen haben? Das ist das Patriarchat bei der Arbeit.</li>
<li><strong>"Sei dominant, sei aggressiv"</strong> \u2014 M\u00e4nner stellen 91% aller Tatverd\u00e4chtigen bei Gewaltdelikten. Aber sie sind auch 70% aller Gewaltopfer \u2014 \u00fcberwiegend durch <em>andere M\u00e4nner</em>. M\u00e4nnliche Gewalt zerst\u00f6rt M\u00e4nner genauso wie Frauen.</li></ul>
<h4>Feminismus ist nicht dein Feind</h4>
<p>Hier ist der entscheidende Punkt: <strong>Feminismus will nicht M\u00e4nner schw\u00e4chen. Feminismus will das System ver\u00e4ndern, das ALLE einschr\u00e4nkt.</strong> Wenn Frauen frei sind, ihren Beruf zu w\u00e4hlen, dann sind auch M\u00e4nner frei, Erzieher oder Pfleger zu werden, ohne ausgelacht zu werden. Wenn V\u00e4ter Elternzeit nehmen k\u00f6nnen, profitieren alle \u2014 die M\u00fctter, die V\u00e4ter und die Kinder.</p>
<p>Die Manosphere erz\u00e4hlt dir: "Feminismus ist dein Feind." Aber die Wahrheit ist: <strong>Dieselben starren Regeln, die Frauen unterdr\u00fccken, machen auch dich kaputt.</strong> Freiheit f\u00fcr alle bedeutet auch Freiheit f\u00fcr dich \u2014 frei zu sein, der Mann zu werden, der du wirklich sein willst, nicht der, den dir jemand vorschreibt.</p>` },
    { type:'collapsible', title:'Freundschaften zwischen Jungs \u2014 der vergessene Schl\u00fcssel', html:`<p>Erinnerst du dich an die Forschung von Niobe Way aus Session 2? Jungs mit 12 beschreiben ihre Freundschaften in den tiefsten T\u00f6nen \u2014 "Er ist alles f\u00fcr mich." Mit 17 sagen dieselben Jungs: "Ich brauch eigentlich niemanden."</p>
<p>Was dazwischen passiert, ist nicht Reifung \u2014 es ist <strong>Verlust</strong>. Jungs verlieren ihre tiefen Freundschaften nicht, weil sie erwachsen werden, sondern weil ihnen beigebracht wird, dass tiefe Freundschaften zwischen Jungs "komisch" oder "schwul" seien. Das ist tragisch.</p>
<p>Die Gegenstrategie ist einfach (aber nicht leicht):</p>
<ul><li><strong>Da sein, wenn es drauf ankommt.</strong> Nicht nur, wenn alles gut l\u00e4uft.</li>
<li><strong>Nachfragen, wenn jemand still wird.</strong> "Hey, alles okay bei dir?" \u2014 dieser einfache Satz kann Leben ver\u00e4ndern.</li>
<li><strong>Sagen k\u00f6nnen: "Mir geht's gerade nicht gut."</strong> Und akzeptieren, wenn ein Freund das sagt.</li>
<li><strong>Nicht alles mit Humor abwehren.</strong> Manchmal meint jemand etwas ernst, auch wenn er dabei lacht.</li></ul>
<p>Die Einsamkeits-Statistik (3% \u2192 15% M\u00e4nner ohne engen Freund) zeigt: Das ist kein individuelles Problem. Es ist eine gesellschaftliche Krise. Und du kannst dagegen ankämpfen \u2014 indem du der Freund bist, den du dir selbst w\u00fcnschst.</p>` },
    { type:'collapsible', title:'Beziehungen und Partnerschaft', html:`<p>Mit 12 f\u00e4ngt man an, sich f\u00fcr Beziehungen zu interessieren \u2014 vielleicht. Egal wo du stehst, ein paar Grunds\u00e4tze gelten immer:</p>
<ul><li><strong>Niemand "geh\u00f6rt" dir</strong> \u2014 nicht deine Freundin, nicht dein Freund, niemand.</li><li><strong>"Nein" ist ein vollst\u00e4ndiger Satz</strong> und verdient immer Respekt \u2014 in beide Richtungen. Du darfst auch "Nein" sagen.</li><li><strong>Echte Anziehung hat nichts mit Tricks oder Manipulation zu tun</strong> \u2014 wenn du "Techniken" brauchst, um jemanden dazu zu bringen, dich zu m\u00f6gen, ist das keine echte Verbindung.</li><li><strong>Verliebt sein kann gro\u00dfartig sein \u2014 und wehtun.</strong> Beides ist okay. Beides geh\u00f6rt dazu.</li></ul>
<p>Und ein letzter Gedanke: Alles, was du \u00fcber Beziehungen in der Manosphere lernst, basiert auf der Idee, dass M\u00e4nner und Frauen <em>Gegner</em> sind. In der Realit\u00e4t sind die besten Beziehungen die, in denen beide Partner ein <em>Team</em> sind.</p>` },
    { type:'quote', text:'Ein starker Mann ist nicht jemand, der andere klein macht. Es ist jemand, der stark genug ist, andere neben sich wachsen zu lassen.' },
    { type:'label', emoji:'\u270F\uFE0F', text:'Aktivit\u00e4t: Schwierige Situationen durchspielen' },
    { type:'card', html:`<p>Besprecht diese Situationen als Gedankenexperiment \u2014 \u00fcberlegt, was ihr konkret <em>sagen</em> w\u00fcrdet:</p>
<ol><li><strong>Schule:</strong> Deine Kumpels machen sich \u00fcber ein M\u00e4dchen lustig. Du findest es nicht fair. Was sagst du? (Tipp: Du musst keine gro\u00dfe Rede halten. Manchmal reicht: "Ey, lass mal.")</li>
<li><strong>Online:</strong> Jemand postet ein frauenfeindliches Meme und alle lachen. Was tust du? (M\u00f6glichkeiten: Nichts sagen, privat demjenigen schreiben, \u00f6ffentlich was sagen, den Server verlassen...)</li>
<li><strong>Freundschaft:</strong> Dein bester Freund ist total down, sagt aber "Alles gut." Was machst du? (Tipp: "Du sagst 'Alles gut', aber du siehst nicht so aus. Ich frag nur, weil du mir wichtig bist.")</li>
<li><strong>Familie:</strong> Dein Vater oder ein anderer Verwandter sagt etwas \u00fcber Frauen, das dich st\u00f6rt. Wie gehst du damit um? (Das ist besonders schwer \u2014 besprecht, warum.)</li></ol>` },
    { type:'label', emoji:'\uD83D\uDC68\u200D\uD83D\uDC69\u200D\uD83D\uDC66', text:'Gemeinsam mit deinen Eltern' },
    { type:'convo', html:'<strong>Frag deinen Papa:</strong> Was f\u00fcr ein Mann wolltest du mit 12 werden? Und was f\u00fcr einer bist du geworden? Was h\u00e4ttest du gern fr\u00fcher gewusst?' },
    { type:'convo', html:'<strong>Frag deine Mama:</strong> Was w\u00fcnschst du dir von M\u00e4nnern? Nicht "der perfekte Mann" \u2014 sondern ganz konkret: Was macht f\u00fcr dich einen guten Partner, Freund, Kollegen aus? Was h\u00e4ttest du dir als M\u00e4dchen von den Jungs in deiner Klasse gew\u00fcnscht?' },
    { type:'activity', title:'Gemeinsames Video (10 Min)', html:`<p>Schaut euch zusammen den TED-Talk von Jackson Katz an: <strong>"Violence against women \u2014 it\u2019s a men\u2019s issue"</strong> (auf YouTube suchen, ca. 18 Min, englisch mit deutschen Untertiteln). Falls das zu lang ist, schaut nur die ersten 5 Minuten \u2014 da erkl\u00e4rt er, warum Gewalt gegen Frauen kein "Frauenthema" ist, sondern ein M\u00e4nnerthema.</p><p>Besprecht danach: Was hat euch \u00fcberrascht? Stimmt ihr zu?</p>` },
    { type:'label', emoji:'\uD83E\uDE9E', text:'Abschluss' },
    { type:'reflect', label:'Vervollst\u00e4ndigt gemeinsam: "Der Mann, der ich sein will, ist jemand, der..."' }
  ]
},
{
  id: 6, title: 'Gewappnet f\u00fcr die Welt', subtitle: 'Dein pers\u00f6nliches Toolkit',
  goal: 'Alle Erkenntnisse zusammenf\u00fchren und ein pers\u00f6nliches "Survival Kit" entwickeln.',
  blocks: [
    { type:'label', emoji:'\uD83D\uDD04', text:'R\u00fcckblick' },
    { type:'convo', html:'<strong>Gespr\u00e4chsimpuls:</strong> Geht die letzten f\u00fcnf Sessions kurz durch. Was ist h\u00e4ngengeblieben? Was war das Wichtigste? Was hat \u00fcberrascht?' },
    { type:'label', emoji:'\uD83E\uDDF0', text:'Dein Medienkompetenz-Toolkit' },
    { type:'collapsible', title:'Werkzeug 1: Der Quellen-Check', html:`<p>Bevor du einen Inhalt glaubst oder teilst:</p>
<ul><li>Wer hat das ver\u00f6ffentlicht? (Person, Medium, Organisation?)</li><li>Gibt es ein Impressum, einen Klarnamen, eine Qualifikation?</li><li>Wird die Behauptung von mehreren unabh\u00e4ngigen Quellen best\u00e4tigt?</li><li>Tipp: Nutze <strong>correctiv.org</strong> oder <strong>mimikama.org</strong> f\u00fcr Faktencheck</li></ul>` },
    { type:'collapsible', title:'Werkzeug 2: Das Emotions-Radar', html:`<p>Algorithmen zielen auf deine Emotionen. Mach dir das bewusst:</p>
<ul><li>Wenn du nach dem Scrollen w\u00fctend, frustriert oder \u00e4ngstlich bist \u2014 war das der Inhalt oder der Algorithmus?</li><li><strong>Regel:</strong> Bevor du etwas kommentierst, teilst oder glaubst \u2014 warte 10 Sekunden. "W\u00fcrde ich das auch morgen fr\u00fch noch so sehen?"</li></ul>` },
    { type:'collapsible', title:'Werkzeug 3: Der Perspektiv-Wechsel', html:`<p>Bei einer starken Meinung, versuche aktiv die Gegenposition zu verstehen:</p>
<ul><li>"Was w\u00fcrde jemand sagen, der das Gegenteil glaubt?"</li><li>"Welche Erfahrungen k\u00f6nnten zu dieser anderen Meinung f\u00fchren?"</li></ul>
<p>Das hei\u00dft nicht, dass du deine Meinung aufgibst. Es hei\u00dft, dass du sie st\u00e4rker machst, weil du sie gepr\u00fcft hast.</p>` },
    { type:'collapsible', title:'Werkzeug 4: Die Bubble-Brechung', html:`<p>Jeder lebt in einer Blase \u2014 auch ohne eigenes Social Media. Brich sie bewusst auf:</p>
<ul><li>Wenn du mal Social Media nutzt: Folge Menschen, die anders denken, aber sachlich argumentieren</li><li>Lies oder schau Nachrichten aus verschiedenen Quellen</li><li>Sprich mit Menschen, die andere Erfahrungen haben</li></ul>` },
    { type:'collapsible', title:'Werkzeug 5: Das Hilfe-Netz', html:`<p>Wissen, wo du Hilfe findest, ist kein Zeichen von Schw\u00e4che \u2014 es ist ein Zeichen von Klugheit:</p>
<ul><li>Vertrauensperson in der Familie</li><li>Vertrauenslehrer:in in der Schule</li><li><strong>Nummer gegen Kummer:</strong> 116 111 (Mo\u2013Sa 14\u201320 Uhr, kostenlos, anonym)</li><li><strong>Online-Beratung:</strong> jugendnotmail.de</li><li><strong>Telefonseelsorge:</strong> 0800 111 0 111 (rund um die Uhr, kostenlos)</li></ul>` },
    { type:'label', emoji:'\uD83E\uDDED', text:'Aktivit\u00e4t: Der pers\u00f6nliche Kompass' },
    { type:'activity', title:'Kompass besprechen (20 Min)', html:`<p>Besprecht zusammen vier Richtungen:</p>
<ul><li><strong>Norden (Werte):</strong> Was sind deine drei wichtigsten Werte?</li><li><strong>Osten (Vorbilder):</strong> Welche 2\u20133 Menschen inspirieren dich?</li><li><strong>S\u00fcden (Warnsignale):</strong> Deine pers\u00f6nlichen Warnsignale, dass du in eine schlechte Richtung driftest?</li><li><strong>Westen (Hilfe):</strong> An wen wendest du dich, wenn es dir nicht gut geht?</li></ul>` },
    { type:'label', emoji:'\u2753', text:'Offene Fragen' },
    { type:'card', html:`<p>M\u00f6gliche Gespr\u00e4chsstarter:</p>
<ul><li>"Gibt es etwas, das du online gesehen hast und das dich besch\u00e4ftigt?"</li><li>"Hat sich dein Blick auf irgendetwas ver\u00e4ndert?"</li><li>"Was war die schwierigste Frage in diesem Modul?"</li><li>"Wor\u00fcber m\u00f6chtest du weiter nachdenken?"</li></ul>` },
    { type:'quote', text:'Du bist kein Produkt und kein Algorithmus. Du bist ein Mensch mit der Freiheit, selbst zu entscheiden, was f\u00fcr dich richtig ist. Nutz diese Freiheit. Hinterfrage. Bleib neugierig. Sei mutig genug, auch mal unsicher zu sein. Das ist keine Schw\u00e4che \u2014 das ist der Anfang von allem, was sich lohnt.' },
    { type:'label', emoji:'\uD83E\uDD1D', text:'Abschluss-Ritual' },
    { type:'card', html:'<p>Gebt euch einen Handschlag und sprecht ein gemeinsames Versprechen aus:</p><p style="text-align:center;font-size:16px;font-weight:700;margin:12px 0;color:var(--accent2)">"Wir bleiben im Gespr\u00e4ch \u2014 auch wenn es unbequem wird."</p>' },
    { type:'label', emoji:'\uD83D\uDC68\u200D\uD83D\uDC69\u200D\uD83D\uDC66', text:'Letztes Eltern-Gespr\u00e4ch' },
    { type:'convo', html:'<strong>Frag beide Eltern:</strong> Was habt ihr in den letzten Wochen durch dieses Modul gelernt \u2014 nicht nur ich, sondern auch ihr? Hat sich an eurem Blick auf irgendetwas etwas ver\u00e4ndert?' },

let state = loadState();
function loadState() {
  try { const s = JSON.parse(localStorage.getItem(SK)||'{}'); return { completed: s.completed||[], currentSession: null }; }
  catch { return { completed: [], currentSession: null }; }
}
function saveState() { localStorage.setItem(SK, JSON.stringify({ completed: state.completed })); }

function render() {
  const app = document.getElementById('app');
  if (state.currentSession) { app.innerHTML = renderSession(state.currentSession); bindSession(); }
  else { app.innerHTML = renderOverview(); bindOverview(); }
}

function renderOverview() {
  const done = state.completed.length, pct = Math.round((done/sessions.length)*100);
  return `<div class="header"><div class="header-icon">\uD83C\uDFAD</div><h1>Stark ohne Maske</h1><p>Geschlechtergerechtigkeit, M\u00e4nnlichkeit & Social Media<br>6 Sessions f\u00fcr Eltern und S\u00f6hne</p></div>
<div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
<div class="progress-label">${done} von ${sessions.length} Sessions abgeschlossen</div>
<div class="session-list">${sessions.map(s=>{const d=state.completed.includes(s.id);return`<div class="session-card ${d?'completed':''}" data-id="${s.id}" tabindex="0" role="button"><div class="session-num">${d?'\u2713':s.id}</div><div class="session-info"><div class="session-name">${s.title}</div><div class="session-desc">${s.subtitle}</div></div><div class="session-badge">${d?'\uD83C\uDFC6':'\u2192'}</div></div>`;}).join('')}</div>
<div class="footer">Stark ohne Maske \u2014 LernHub Familie Grimm</div>`;
}

function renderSession(id) {
  const s = sessions.find(x=>x.id===id); if(!s)return'';
  const d = state.completed.includes(s.id);
  return `<button class="back-btn" id="back"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>\u00dcbersicht</button>
<div class="session-header"><span class="num-badge">Session ${s.id} von 6</span><h2>${s.title}</h2><div class="goal">${s.goal}</div></div>
${s.blocks.map(renderBlock).join('')}
<button class="complete-btn ${d?'done':''}" id="complete-btn">${d?'\u2713 Session abgeschlossen':'Session als erledigt markieren'}</button>`;
}

function renderBlock(b) {
  switch(b.type) {
    case 'label': return `<div class="block-label"><span class="emoji">${b.emoji}</span> ${b.text}</div>`;
    case 'card': return `<div class="card">${b.html}</div>`;
    case 'quote': return `<div class="quote">${b.text}</div>`;
    case 'activity': return `<div class="activity"><h3>${b.title}</h3>${b.html}</div>`;
    case 'convo': return `<div class="convo">${b.html}</div>`;
    case 'collapsible': return `<button class="collapsible-toggle" data-col><span>${b.title}</span><span class="arrow">\u25B6</span></button><div class="collapsible-content"><div class="card">${b.html}</div></div>`;
    case 'reflect': return `<div class="reflect-prompt"><strong>Zum Nachdenken:</strong> ${b.label}</div>`;
    default: return '';
  }
}

function bindOverview() {
  document.querySelectorAll('.session-card').forEach(c=>{
    const h=()=>{state.currentSession=+c.dataset.id;render();window.scrollTo(0,0);};
    c.addEventListener('click',h); c.addEventListener('keydown',e=>{if(e.key==='Enter')h();});
  });
}
function bindSession() {
  document.getElementById('back').addEventListener('click',()=>{state.currentSession=null;render();window.scrollTo(0,0);});
  document.querySelectorAll('[data-col]').forEach(btn=>{btn.addEventListener('click',()=>{btn.classList.toggle('open');btn.nextElementSibling.classList.toggle('open');});});
  document.getElementById('complete-btn').addEventListener('click',()=>{const id=state.currentSession;if(!state.completed.includes(id)){state.completed.push(id);saveState();render();window.scrollTo(0,document.body.scrollHeight);}});
}
render();
</script>
