<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stark ohne Maske</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0f172a; --surface: #1e293b; --surface2: #334155;
      --text: #f1f5f9; --muted: #94a3b8; --accent: #8b5cf6;
      --accent2: #a78bfa; --warm: #f59e0b; --green: #22c55e;
      --radius: 14px;
    }
    html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', system-ui, sans-serif; background: var(--bg); color: var(--text); }
    body { overflow-y: auto; -webkit-overflow-scrolling: touch; }
    .app { max-width: 640px; margin: 0 auto; padding: 20px 16px 40px; min-height: 100vh; }

    /* Header */
    .header { text-align: center; margin-bottom: 28px; }
    .header-icon { font-size: 48px; margin-bottom: 8px; }
    .header h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
    .header p { color: var(--muted); font-size: 13px; line-height: 1.5; }

    /* Progress */
    .progress-bar { background: var(--surface); border-radius: 8px; height: 8px; margin-bottom: 24px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 8px; transition: width 0.5s ease; }
    .progress-label { text-align: center; font-size: 12px; color: var(--muted); margin-top: -18px; margin-bottom: 20px; }

    /* Session list */
    .session-list { display: flex; flex-direction: column; gap: 12px; }
    .session-card {
      background: var(--surface); border-radius: var(--radius); padding: 16px 18px;
      display: flex; align-items: center; gap: 14px; cursor: pointer;
      border: 1px solid transparent; transition: all 0.2s;
    }
    .session-card:hover, .session-card:focus { background: var(--surface2); border-color: var(--accent); outline: none; }
    .session-card.completed { border-left: 3px solid var(--green); }
    .session-num {
      width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 15px; flex-shrink: 0;
      background: rgba(139,92,246,0.15); color: var(--accent2);
    }
    .session-card.completed .session-num { background: rgba(34,197,94,0.15); color: var(--green); }
    .session-info { flex: 1; min-width: 0; }
    .session-name { font-weight: 600; font-size: 15px; margin-bottom: 2px; }
    .session-desc { font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .session-badge { font-size: 18px; flex-shrink: 0; }

    /* Session view */
    .session-view { display: none; }
    .session-view.active { display: block; }
    .back-btn {
      background: none; border: none; color: var(--accent2); font-size: 14px; font-weight: 600;
      cursor: pointer; padding: 8px 0; margin-bottom: 16px; display: flex; align-items: center; gap: 6px;
    }
    .back-btn svg { width: 18px; height: 18px; }
    .session-header { margin-bottom: 24px; }
    .session-header .num-badge {
      display: inline-block; background: rgba(139,92,246,0.15); color: var(--accent2);
      font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 12px; margin-bottom: 8px;
    }
    .session-header h2 { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
    .session-header .goal { font-size: 13px; color: var(--muted); line-height: 1.5; }

    /* Blocks */
    .block-label {
      font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
      color: var(--accent2); margin: 28px 0 12px; display: flex; align-items: center; gap: 6px;
    }
    .block-label:first-child { margin-top: 0; }
    .block-label .emoji { font-size: 14px; }

    .card {
      background: var(--surface); border-radius: var(--radius); padding: 16px 18px;
      margin-bottom: 12px; line-height: 1.7; font-size: 14px;
    }
    .card h3 { font-size: 15px; font-weight: 700; margin-bottom: 8px; }
    .card h4 { font-size: 14px; font-weight: 700; margin: 14px 0 6px; color: var(--accent2); }
    .card p { margin-bottom: 12px; }
    .card p:last-child { margin-bottom: 0; }
    .card ul, .card ol { padding-left: 20px; margin-bottom: 12px; }
    .card li { margin-bottom: 8px; line-height: 1.6; }

    .quote {
      background: linear-gradient(135deg, rgba(139,92,246,0.12), rgba(245,158,11,0.08));
      border-left: 3px solid var(--accent);
      border-radius: 0 var(--radius) var(--radius) 0;
      padding: 16px 18px; font-size: 15px; font-weight: 500; line-height: 1.6;
      font-style: italic; margin-bottom: 16px;
    }
    .activity {
      background: rgba(245,158,11,0.08); border: 1px solid rgba(245,158,11,0.2);
      border-radius: var(--radius); padding: 16px 18px; margin-bottom: 12px;
    }
    .activity h3 { color: var(--warm); font-size: 14px; margin-bottom: 8px; }
    .activity p, .activity li { font-size: 13px; line-height: 1.65; }
    .activity ul, .activity ol { padding-left: 20px; margin-top: 8px; }
    .activity li { margin-bottom: 6px; }

    .convo {
      background: rgba(34,197,94,0.08); border: 1px solid rgba(34,197,94,0.2);
      border-radius: var(--radius); padding: 14px 16px; margin-bottom: 12px; font-size: 13px; line-height: 1.6;
    }
    .convo strong { color: var(--green); }

    .reflect-prompt {
      background: linear-gradient(135deg, rgba(139,92,246,0.08), rgba(34,197,94,0.06));
      border: 1px solid rgba(139,92,246,0.2); border-radius: var(--radius);
      padding: 14px 16px; margin-bottom: 16px; font-size: 13px; line-height: 1.6;
    }
    .reflect-prompt strong { color: var(--accent2); }

    /* Collapsible */
    .collapsible-toggle {
      background: var(--surface); border: 1px solid var(--surface2); border-radius: var(--radius);
      padding: 14px 16px; width: 100%; text-align: left; color: var(--text); font-size: 14px;
      font-weight: 600; cursor: pointer; display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 2px; transition: background 0.2s;
    }
    .collapsible-toggle:hover { background: var(--surface2); }
    .collapsible-toggle .arrow { transition: transform 0.2s; font-size: 12px; color: var(--muted); }
    .collapsible-toggle.open .arrow { transform: rotate(90deg); }
    .collapsible-content { display: none; padding: 4px 0 12px; }
    .collapsible-content.open { display: block; }

    .complete-btn {
      display: block; width: 100%; padding: 14px; border: none; border-radius: var(--radius);
      background: linear-gradient(135deg, var(--accent), #7c3aed); color: #fff;
      font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 24px; transition: opacity 0.2s;
    }
    .complete-btn:hover { opacity: 0.9; }
    .complete-btn.done { background: var(--green); }
    .footer { text-align: center; padding: 30px 0 10px; font-size: 11px; color: var(--surface2); }
  </style>
</head>
<body>
<div class="app" id="app"></div>
<script>
const SK = 'starkOhneMaskeProgress';
const sessions = [
{
  id: 1, title: 'Wie es wurde, wie es ist', subtitle: 'Geschlechterrollen im Wandel der Zeit',
  goal: 'Verstehen, dass Vorstellungen von "männlich" und "weiblich" sich über die Jahrhunderte stark verändert haben und nicht in Stein gemeißelt sind.',
  blocks: [
    { type:'label', emoji:'💬', text:'Einstieg: Was ist eigentlich "männlich"?' },
    { type:'activity', title:'Übung (10 Min)', html:'<p>Überlegt euch jeweils fünf Antworten auf: <strong>"Ein richtiger Mann ist jemand, der..."</strong> — und vergleicht eure Antworten.</p>' },
    { type:'convo', html:'<strong>Gesprächsimpuls:</strong> Woher kommen diese Ideen? Wer hat dir das beigebracht — Schule, Freunde, Filme, TikTok, Familie?' },
    { type:'label', emoji:'📚', text:'Wissensblock: Eine Reise durch die Geschichte' },
    { type:'collapsible', title:'Steinzeit und Antike', html:`<p>In der Frühgeschichte der Menschheit gab es tatsächlich eine gewisse Arbeitsteilung — aber sie war viel flexibler als man oft denkt. Archäologische Funde zeigen, dass auch Frauen jagten und Männer sich um Kinder kümmerten. Die starren Rollen, die wir heute als "natürlich" empfinden, sind viel jünger als die Menschheit selbst.</p>
<p>Im antiken Griechenland galten Männer, die weinten, als besonders ehrenhaft — Odysseus weint in Homers Erzählungen ständig, und niemand fand das schwach. Gleichzeitig hatten Frauen in Athen kaum Rechte. Männlichkeit bedeutete damals also etwas völlig anderes als heute.</p>` },
    { type:'collapsible', title:'Mittelalter und Ritterzeit', html:`<p>Das Ritterideal verlangte von Männern Tapferkeit, aber auch Höflichkeit, Dichtkunst und Gefühlsausdruck. Ein Ritter, der nicht über Liebe dichten konnte, galt als unvollständig.</p>
<p>Gleichzeitig war die Gesellschaft zutiefst ungleich — die allermeisten Männer waren arme Bauern, deren "Männlichkeit" niemanden interessierte.</p>` },
    { type:'collapsible', title:'Industrialisierung (ab ca. 1800)', html:`<p>Erst mit der Industrialisierung entstand das Modell, das viele heute als "traditionell" empfinden: Der Mann geht arbeiten, die Frau bleibt zu Hause. Vorher arbeiteten die meisten Familien zusammen — auf dem Feld, in der Werkstatt.</p>
<p>Das "klassische" Familienmodell ist also gerade einmal 200 Jahre alt.</p>` },
    { type:'collapsible', title:'20. Jahrhundert — DDR und BRD', html:`<p>Hier wird es besonders spannend für Potsdam: In der DDR war es selbstverständlich, dass Frauen arbeiten gingen. Fast 90% der Frauen waren berufstätig. Männer in der DDR erlebten Frauen im Berufsleben als Normalität.</p>
<p>In der BRD war das lange anders — dort dominierte das Modell der Hausfrau bis in die 1970er Jahre. Bis 1977 konnte ein Ehemann in der BRD seiner Frau verbieten, arbeiten zu gehen. Das ist keine uralte Geschichte — das war vor weniger als 50 Jahren.</p>` },
    { type:'collapsible', title:'Heute', html:`<p>Formal sind Männer und Frauen gleichberechtigt. Aber in der Praxis gibt es weiterhin Unterschiede: beim Gehalt (Gender Pay Gap), bei der Verteilung von Hausarbeit und Kinderbetreuung, bei der Frage, wer in Führungspositionen sitzt.</p>
<p>Gleichzeitig hat sich enorm viel verändert — und die Veränderung geht weiter.</p>` },
    { type:'quote', text:'Männlichkeit ist kein feststehendes Ding. Was als "männlich" gilt, hat sich in jeder Epoche verändert. Das bedeutet: Auch du hast die Freiheit, selbst zu definieren, was für dich ein guter Mann sein heißt.' },
    { type:'label', emoji:'✏️', text:'Aktivität: Die Zeitstrahl-Übung' },
    { type:'activity', title:'Zeitstrahl-Quiz (15 Min)', html:'<p>Ratet mal — wann war was? Dann schaut euch die Antworten an:</p><ul><li>Frauenwahlrecht in Deutschland: <strong>1918</strong></li><li>Frauenwahlrecht in der Schweiz: <strong>1971!</strong></li><li>Frauen dürfen ohne Erlaubnis des Mannes arbeiten: <strong>1977</strong></li><li>Elternzeit für Väter in Deutschland: <strong>2007</strong></li></ul>' },
    { type:'convo', html:'<strong>Gesprächsfrage:</strong> Was davon hat dich überrascht? Was wird sich wohl in den nächsten 50 Jahren noch verändern?' },
    { type:'label', emoji:'🪞', text:'Abschluss' },
    { type:'reflect', label:'"Ich wusste nicht, dass..." — Vervollständigt den Satz gemeinsam.' }
  ]
},
{
  id: 2, title: 'Was in deinem Kopf passiert', subtitle: 'Psychologie der Männlichkeit',
  goal: 'Verstehen, warum sich Jungs oft unter Druck gesetzt fühlen, bestimmte Erwartungen zu erfüllen — und lernen, dass Verletzlichkeit keine Schwäche ist.',
  blocks: [
    { type:'label', emoji:'🎭', text:'Einstieg: Die Masken-Übung' },
    { type:'activity', title:'Gedankenexperiment (10 Min)', html:'<p>Stellt euch vor, ihr habt zwei Gesichter: Eines, das ihr der Welt zeigt, und eines, das nur ihr selbst kennt. Welche Gefühle zeigt ihr nach außen? Welche versteckt ihr? Besprecht das.</p>' },
    { type:'convo', html:'<strong>Gesprächsimpuls:</strong> Gibt es Gefühle, die du dir nicht erlaubst zu zeigen? Warum?' },
    { type:'label', emoji:'🧠', text:'Wissensblock: Warum Jungs sich oft so verhalten' },
    { type:'collapsible', title:'Die "Man Box"', html:`<p>Forscher haben ein Konzept entwickelt, das sie die "Man Box" nennen. Es beschreibt die unsichtbaren Regeln, die Jungs und Männer einengen:</p>
<ul><li>Sei stark, zeig keine Schwäche</li><li>Kontrolliere deine Gefühle (außer Wut — die ist erlaubt)</li><li>Sei dominant, nicht unterwürfig</li><li>Sei sexuell erfahren</li><li>Verdien Geld, sei erfolgreich</li><li>Bitte nicht um Hilfe</li></ul>
<p>Diese Regeln lernen Jungs nicht in einem einzigen Moment. Sie sickern ein — durch Sprüche auf dem Schulhof ("Heul nicht, du Mädchen!"), durch Filme, durch Social Media, durch Vorbilder.</p>
<p>Das Problem: Jungs, die sich streng an diese Regeln halten, haben nachweislich häufiger psychische Probleme, sind häufiger einsam und haben schlechtere Beziehungen.</p>` },
    { type:'collapsible', title:'Was Pubertät mit deinem Gehirn macht', html:`<p>Mit 12 bist du mitten in einer Phase, in der dein Gehirn sich komplett umbaut. Der präfrontale Kortex — der Teil, der für vorausschauendes Denken, Impulskontrolle und das Abwägen von Konsequenzen zuständig ist — ist erst mit Mitte 20 vollständig entwickelt. Gleichzeitig sind die emotionalen Zentren im Gehirn (die Amygdala) auf Hochtouren.</p>
<p>Das bedeutet: Starke Gefühle, Unsicherheit, Wut, Sehnsucht nach Zugehörigkeit — das ist nicht deine Schwäche. Das ist Biologie. Und es ist völlig normal.</p>` },
    { type:'collapsible', title:'Warum Zugehörigkeit so wichtig ist', html:`<p>Menschen sind soziale Wesen. In der Pubertät wird das Bedürfnis nach Zugehörigkeit besonders stark. Du willst dazugehören, respektiert werden, nicht ausgeschlossen sein.</p>
<p>Genau dieses Bedürfnis nutzen bestimmte Online-Communities aus: Sie bieten dir eine Gruppe, eine Identität, einfache Antworten. Aber dazu mehr in Session 3.</p>` },
    { type:'collapsible', title:'Emotionale Intelligenz — die wahre Stärke', html:`<p>Studien zeigen: Männer, die ihre Gefühle benennen und ausdrücken können, sind nicht schwächer — sie sind resilienter. Sie haben stabilere Freundschaften, bessere Beziehungen und sind psychisch gesünder.</p>
<p>Die Fähigkeit, über Gefühle zu sprechen, ist keine "Mädchensache" — sie ist ein Überlebenswerkzeug.</p>` },
    { type:'quote', text:'Sich verletzlich zu zeigen erfordert mehr Mut als eine harte Fassade aufzusetzen. Echte Stärke heißt, zu wissen, was du fühlst — und es auch sagen zu können.' },
    { type:'label', emoji:'✏️', text:'Aktivität: Das Gefühlsvokabular' },
    { type:'activity', title:'Gefühlsvokabular sammeln (15 Min)', html:`<p>Versucht gemeinsam, so viele Gefühlswörter wie möglich zu sammeln. Startet mit den offensichtlichen (glücklich, traurig, wütend) und dann feiner: <em>enttäuscht, beschämt, überfordert, eifersüchtig, stolz, dankbar, verlegen, sehnsüchtig...</em></p>
<p>Wer mehr Wörter für Gefühle hat, kann seine innere Welt besser verstehen. Das klingt simpel — ist aber ein echter Gamechanger.</p>` },
    { type:'convo', html:'<strong>Gesprächsfrage:</strong> Welches dieser Gefühle hast du in der letzten Woche erlebt, ohne es jemandem zu sagen?' },
    { type:'label', emoji:'💡', text:'Exkurs: Männliche Vorbilder' },
    { type:'card', html:`<p>Denkt gemeinsam nach: Welche Männer bewunderst du? Das können reale Menschen sein oder Figuren aus Filmen und Serien. Was genau bewunderst du an ihnen? Und dann die Gegenfrage: Welche Eigenschaften haben sie, die <em>nicht</em> in die "Man Box" passen?</p>
<p>Beispiel: Viele Jungs bewundern Sportler. Aber gerade im Profisport sprechen immer mehr Männer offen über psychische Gesundheit — Per Mertesacker über seine Angst vor Spielen, Michael Phelps über Depressionen. Ist das schwach? Oder mutig?</p>` },
    { type:'label', emoji:'🪞', text:'Abschluss' },
    { type:'reflect', label:'Stell dir vor, du könntest deinem 16- oder 18-jährigen Ich eine Nachricht schicken. Was würdest du sagen? Besprecht das.' }
  ]
},
{
  id: 3, title: 'Die Landkarte der Verführung', subtitle: 'Das Ökosystem der toxischen Männlichkeitsbewegung',
  goal: 'Verstehen, dass es nicht nur EINE Szene gibt, sondern ein ganzes, miteinander verwobenes Ökosystem von Bewegungen, die Jungs und Männer ansprechen — oft mit verschiedenen Einstiegspunkten, aber ähnlichen Endstationen.',
  blocks: [
    { type:'label', emoji:'📱', text:'Einstieg: Dein Feed, deine Welt' },
    { type:'convo', html:'<strong>Gesprächsimpuls:</strong> Wenn du Videos bei YouTube schaust oder bei Freunden am Handy mitguckst — welche Inhalte siehst du am häufigsten? Hast du schon mal Content gesehen, bei dem es um "Alpha Male", "Sigma Grindset", "Looksmaxxing", Fitness-Transformation, Krypto-Reichtum oder "Frauen verstehen" ging? Falls ja — das ist kein Zufall.' },
    { type:'label', emoji:'🔍', text:'Wissensblock Teil 1: Wie Algorithmen dich füttern' },
    { type:'collapsible', title:'Die Aufmerksamkeitsökonomie', html:`<p>Social-Media-Plattformen wie TikTok, YouTube und Instagram sind keine neutralen Werkzeuge. Sie sind Maschinen, die Geld verdienen, indem sie deine Aufmerksamkeit verkaufen. Je länger du scrollst, desto mehr Werbung siehst du, desto mehr Geld verdienen sie.</p>
<p>Dafür setzen sie Algorithmen ein — Programme, die lernen, was dich fesselt, und dir immer mehr davon zeigen. Das Problem: Algorithmen bevorzugen Inhalte, die starke Emotionen auslösen. Wut, Empörung, Angst, aber auch das Gefühl von Überlegenheit — all das hält dich auf der Plattform.</p>
<p>Auch wenn du selbst noch kein Social Media hast: Du wirst diese Inhalte trotzdem kennenlernen — bei Freunden, in der Schule, auf YouTube. Wenn jemand einmal ein Video über "Alpha Males" oder "Frauen verstehen" anklickt — selbst aus Neugier —, merkt sich das der Algorithmus. Innerhalb weniger Tage kann sich der Feed komplett verändern. Das nennt man den <strong>"Rabbit Hole"-Effekt</strong>. Und dieser Effekt ist kein Bug — er ist ein Feature. Die Plattformen wollen das so.</p>` },
    { type:'collapsible', title:'Warum Jungs besonders betroffen sind', html:`<p>Der Algorithmus weiß, dass du ein Junge um die 12 bist. Er weiß, dass Jungs in deinem Alter stark auf Inhalte reagieren, die mit Status, Wettbewerb, Zugehörigkeit und Geschlechteridentität zu tun haben. Also füttert er dich damit. Nicht weil es gut für dich ist — sondern weil es gut für die Plattform ist.</p>` },
    { type:'label', emoji:'🗺️', text:'Wissensblock Teil 2: Die Landkarte — Das gesamte Ökosystem' },
    { type:'card', html:`<p>Was jetzt kommt, ist keine einzelne "Szene". Es ist ein ganzes Universum von Bewegungen, Influencern und Ideologien, die unterschiedlich aussehen, aber untereinander vernetzt sind. Stell dir das wie eine Stadt vor mit verschiedenen Vierteln — manche wirken harmlos, manche sind gefährlich, und die Straßen dazwischen sind fließend.</p>` },
    { type:'collapsible', title:'Viertel 1: Die Manosphere (das ideologische Zentrum)', html:`<p>Die Manosphere ist der Oberbegriff für Online-Communities, deren Kern die Überzeugung ist: Männer sind die wahren Opfer der modernen Gesellschaft. Sie besteht aus verschiedenen Strömungen:</p>
<h4>Red Pill</h4>
<p>Glauben, dass Feminismus Männer unterdrückt und die "Wahrheit" über Geschlechterrollen verschleiert wird. Der Name kommt aus dem Film "Matrix". Typische Aussage: "Frauen wollen nur Geld und Status — wenn du das durchschaust, hast du Macht."</p>
<h4>Pick-Up-Artists (PUA)</h4>
<p>Männer, die Techniken lehren, um Frauen zu "erobern". Behandeln Frauen als Objekte, die man mit den richtigen Tricks "bekommt". Klingt vielleicht erstmal wie Flirt-Tipps — ist aber ein System, das auf Manipulation und Entmenschlichung basiert.</p>
<h4>MGTOW ("Men Going Their Own Way")</h4>
<p>Männer, die sich komplett von Beziehungen mit Frauen zurückziehen — angeblich aus freier Wahl, tatsächlich oft aus Verbitterung und Enttäuschung. Ihre Foren sind voller Frauenhass, verkleidet als "Selbstbestimmung".</p>
<h4>Incels ("Involuntary Celibates")</h4>
<p>Männer, die sich als Opfer sehen, weil sie keine Partnerin finden. In dieser Szene gibt es teils extreme Frauenfeindlichkeit bis hin zu Gewaltverherrlichung und Terrorismus. Mehrere Anschläge weltweit wurden von Männern verübt, die sich als Incels bezeichneten.</p>
<h4>Black Pill</h4>
<p>Die düsterste Variante. Glaubt, dass dein Schicksal biologisch vorbestimmt ist — durch dein Aussehen, deine Gene, deine Größe. Wer nicht als "Chad" geboren wurde, hat verloren. Diese Ideologie führt bei manchen zu Hoffnungslosigkeit und bei anderen zu Gewalt.</p>` },
    { type:'collapsible', title:'Viertel 2: Die Grindset- und Hustle-Kultur', html:`<p>Das ist die Business-Seite der toxischen Männlichkeit — und oft der erste Einstieg für Jungs, die gar nicht nach Frauenthemen suchen.</p>
<h4>Sigma-Male-Grindset</h4>
<p>Die Idee, dass der "wahre" Mann ein einsamer Wolf ist, der "grindet", während alle anderen schlafen. Klingt erstmal harmlos — wer will nicht erfolgreich sein? Aber die Botschaft darunter ist: Dein Wert als Mann wird durch Geld und Status definiert. Beziehungen sind Ablenkung. Gefühle sind Schwäche. Schlaf ist für Verlierer.</p>
<h4>Hustle Culture / Krypto-Bros</h4>
<p>Influencer, die dir mit Lamborghinis und Dubai-Villen im Hintergrund erklären, wie du mit 18 Millionär wirst. Ihre "Kurse" und "Masterclasses" kosten oft hunderte Euro. Das eigentliche Geschäftsmodell: DICH als Kunden.</p>
<h4>Andrew Tate als Prototyp</h4>
<p>Tate vereint fast alles in einer Person — Hustle Culture, Frauenfeindlichkeit, Luxus als Beweis für Männlichkeit und eine Opfererzählung ("Die Matrix will mich zum Schweigen bringen"). Er wurde wegen Menschenhandel und Vergewaltigung angeklagt. Trotzdem hat er Millionen Fans — weil er echte Verunsicherung anspricht und falsche Stärke verkauft.</p>
<h4>Warum das gefährlich ist</h4>
<p>Es beginnt mit "Arbeite hart, sei diszipliniert" — das sind erstmal keine schlechten Ratschläge. Aber die Grindset-Kultur bindet deinen gesamten Selbstwert an Geld und Leistung. Wer nicht erfolgreich ist, hat "nicht genug gewollt". Das macht krank — und es ist eine Lüge.</p>` },
    { type:'collapsible', title:'Viertel 3: Looksmaxxing und der Körperkult', html:`<h4>Looksmaxxing</h4>
<p>Die Szene, die behauptet, du könntest dein Aussehen systematisch "optimieren" — durch Ernährung, Gesichtsübungen ("mewing"), Körperhaltung. In der harmlosen Variante ist das normaler Selbstpflege-Content. In der extremen Variante ("hardmaxxing") geht es um Schönheitsoperationen und Kieferimplantate — bei 14-Jährigen.</p>
<h4>Bonesmashing</h4>
<p>Ein besonders verstörender Trend — Jungs, die sich wiederholt ins Gesicht schlagen, weil sie glauben, das würde ihre Kieferknochen "maskuliner" machen. Das ist nicht nur unwirksam, sondern gefährlich.</p>
<h4>Fitness-Bro-Kultur / Roid Culture</h4>
<p>Sport und Fitness sind großartig. Aber in der toxischen Variante wird der Körper zum einzigen Maßstab für Männlichkeit. Steroide werden normalisiert — auch bei Minderjährigen. Creators zeigen "natürliche Transformationen", die in Wahrheit nur mit Doping möglich sind.</p>
<h4>Body Dysmorphia bei Jungs</h4>
<p>Worüber kaum jemand spricht: Immer mehr Jungs haben ein gestörtes Verhältnis zu ihrem Körper. Essstörungen bei Jungen nehmen zu. Die Unzufriedenheit mit dem eigenen Körper ist bei männlichen Teenagern so hoch wie nie zuvor. Looksmaxxing-Content befeuert das massiv.</p>
<h4>Warum das gefährlich ist</h4>
<p>Es gibt nichts Falsches daran, auf sich zu achten. Aber wenn du mit 12 glaubst, dein Gesicht sei "zu schwach" und du müsstest dich operieren lassen — dann hat dich eine Ideologie erreicht, die deinen Selbstwert an dein Aussehen kettet.</p>` },
    { type:'collapsible', title:'Viertel 4: Die Pseudo-Intellektuellen', html:`<h4>Jordan Peterson und die "Ordne dein Zimmer"-Fraktion</h4>
<p>Peterson ist ein kanadischer Psychologe, der mit durchaus nützlichen Selbsthilfe-Ratschlägen begonnen hat. Das Problem: Von dort aus führt ein direkter Weg zu seinen Ansichten über "natürliche Geschlechterhierarchien" und seiner zunehmenden Nähe zu rechten Bewegungen. Er ist das perfekte Beispiel für die Pipeline: Man kommt wegen der Selbsthilfe — und bleibt für die Ideologie.</p>
<h4>"Fakten kennen keine Gefühle"-Debattierkultur</h4>
<p>Influencer, die komplexe soziale Fragen auf "Logik" und "Fakten" reduzieren. Typisch: Compilations, in denen ein Mann eine Feministin in einer Debatte "zerstört". Das trainiert eine Art zu denken, die auf Gewinnen statt auf Verstehen ausgelegt ist.</p>
<h4>Stoizismus-Bros</h4>
<p>Die Philosophie der Stoa wird in Social Media zu "Zeig keine Gefühle, sei unberührbar" verkürzt. Echte stoische Philosophen sprachen ausführlich über Mitgefühl und Gemeinschaft. Die TikTok-Version macht daraus: "Sei ein Roboter."</p>
<h4>Evolutionspsychologie-Populismus</h4>
<p>Aussagen wie "Männer sind von Natur aus Jäger" werden als Wissenschaft verkauft. In Wahrheit ist die Evolutionspsychologie ein komplexes, umstrittenes Feld, und diese vereinfachten Erklärungen dienen nur dazu, den Status quo zu rechtfertigen.</p>
<h4>Warum das gefährlich ist</h4>
<p>Diese Strömung ist besonders tückisch, weil sie sich als intellektuell und vernünftig tarnt. "Ich bin kein Frauenfeind, ich bin einfach rational." Aber die Grundbotschaft ist oft dieselbe.</p>` },
    { type:'collapsible', title:'Viertel 5: Gaming-Kultur und Meme-Welten', html:`<h4>Toxische Gaming-Communities</h4>
<p>In vielen Online-Spielen ist es normal, andere Spieler sexistisch oder rassistisch zu beleidigen. "Das ist doch nur Spaß" ist die Standard-Ausrede. Aber: Wenn du jeden Tag in einer Umgebung bist, in der Frauenhass als Humor gilt, verschiebt sich dein Kompass.</p>
<h4>Meme-Kultur als Radikalisierungsweg</h4>
<p>Memes sind die Sprache des Internets. Extreme Ideen lassen sich als Witze verpacken. Wer lacht, gehört dazu. Wer nicht lacht, wird als "Spaßbremse" aussortiert. Das nennt man "Ironic Radicalization" — Radikalisierung durch Humor.</p>
<h4>Discord-Server und geschlossene Gruppen</h4>
<p>Viel findet nicht auf öffentlichen Plattformen statt, sondern in geschlossenen Discord-Servern und Telegram-Gruppen. Dort gibt es keine Moderation, keine Gegenrede, nur Echokammern. Für Eltern: Das ist der Teil, den ihr nicht seht.</p>
<h4>Der "Based"-Jargon</h4>
<p>Eine ganze Sprache, die Zugehörigkeit signalisiert: "based", "cringe", "NPC", "red-pilled". Wer die Sprache spricht, gehört dazu. Wer sie nicht kennt, ist draußen.</p>` },
    { type:'collapsible', title:'Viertel 6: Die Tradcon-Bewegung', html:`<h4>"Tradwife" und "Trad"-Ideologie</h4>
<p>Content, der eine romantisierte Version der 1950er-Jahre verkauft — die Frau kocht in Pastellfarben, der Mann ist Versorger. Die Botschaft darunter: Frauen gehören ins Haus, Männer müssen die Kontrolle haben.</p>
<h4>Religiös begründeter Antifeminismus</h4>
<p>In manchen religiösen Communities wird Geschlechtergerechtigkeit als Angriff auf Gottes Ordnung dargestellt. Das betrifft nicht eine bestimmte Religion.</p>
<h4>Die "Krise der Männlichkeit"-Erzählung</h4>
<p>Konservative Kommentatoren behaupten, die Gesellschaft sei "zu weiblich" geworden. Manche Beobachtungen haben einen wahren Kern. Aber die vorgeschlagene Lösung — zurück zu traditionellen Geschlechterrollen — löst das Problem nicht.</p>` },
    { type:'label', emoji:'🔗', text:'Wie alles zusammenhängt: Die Pipeline' },
    { type:'card', html:`<p>Der typische Weg sieht so aus:</p>
<p><strong>Einstieg:</strong> Du schaust ein Fitness-Transformationsvideo. Harmlos.</p>
<p><strong>→ Stufe 1:</strong> Der Algorithmus zeigt dir "Sigma-Grindset"-Content.</p>
<p><strong>→ Stufe 2:</strong> Du landest bei einem Podcast-Clip, in dem ein "Debattenkönig" eine Feministin "zerstört".</p>
<p><strong>→ Stufe 3:</strong> Du bist auf einem Discord-Server mit Memes, die Frauen erniedrigen. "Ist doch lustig."</p>
<p><strong>→ Stufe 4:</strong> Du siehst Red-Pill-Content als Erklärung für alles. "Jetzt verstehe ich."</p>
<p><strong>→ Stufe 5:</strong> Du bist in einer Blase, in der Frauenfeindlichkeit, Verschwörungsdenken und politischer Extremismus normal sind.</p>
<p>Das passiert nicht über Nacht. Es passiert über Wochen und Monate, und es fühlt sich nicht wie Radikalisierung an. Es fühlt sich an wie: endlich Antworten haben.</p>` },
    { type:'label', emoji:'🎯', text:'Die Playbook-Taktiken — quer durch alle Viertel' },
    { type:'card', html:`<p>Obwohl die Einstiege unterschiedlich sind, nutzen fast alle Strömungen dieselben psychologischen Tricks:</p>
<p><strong>1. Sie starten mit echten Problemen:</strong> "Jungs haben es heute schwer" — das hat einen wahren Kern. Höhere Suizidrate, weniger emotionale Unterstützung, sinkende Bildungsabschlüsse. All diese Bewegungen greifen echte Probleme auf — aber bieten die falschen Lösungen.</p>
<p><strong>2. Sie bieten einfache Feindbilder:</strong> "Frauen sind schuld", "Feminismus hat alles kaputt gemacht", "Die woke Kultur zerstört die Männlichkeit."</p>
<p><strong>3. Sie verkaufen ein Upgrade-Versprechen:</strong> "Werde ein Alpha", "Maxe dein Aussehen", "Grinde bis du Millionär bist."</p>
<p><strong>4. Sie nutzen Humor und Ironie als Tarnkappe:</strong> Extreme Aussagen werden als Memes verpackt. Wer Einwände hat, "versteht den Witz nicht."</p>
<p><strong>5. Sie schaffen exklusive Sprache:</strong> "based", "red-pilled", "cope", "NPC" — Zugehörigkeit schaffen, Außenstehende ausgrenzen.</p>
<p><strong>6. Sie isolieren dich:</strong> "Vertraue nur uns", "Deine Eltern sind blue-pilled."</p>
<p><strong>7. Sie monetarisieren deine Verunsicherung:</strong> Fast alle verkaufen etwas — Kurse, Supplemente, Coaching. Du bist nicht ihre Community. Du bist ihr Kunde.</p>` },
    { type:'quote', text:'Es gibt nicht DIE eine gefährliche Szene im Internet. Es gibt ein ganzes Netzwerk von Strömungen — manche tarnen sich als Fitness-Tipps, manche als Finanz-Coaching, manche als Philosophie, manche als Humor. Was sie verbindet: Sie alle wollen dir sagen, wer du als Mann zu sein hast. Und sie alle verdienen Geld oder Macht mit deiner Verunsicherung.' },
    { type:'label', emoji:'✏️', text:'Aktivität: Der Algorithmus-Check' },
    { type:'activity', title:'Übung (20 Min)', html:`<p>Schaut euch zusammen auf YouTube einen Clip an, der für "Sigma Male Grindset" oder "Looksmaxxing Guide" wirbt. Analysiert gemeinsam:</p>
<ul><li>Was wird versprochen?</li><li>Welche Emotionen soll das auslösen?</li><li>In welches "Viertel" gehört das?</li><li>Wer verdient an diesem Content Geld?</li><li>Wohin könnte der Algorithmus dich von hier aus schicken?</li></ul>` },
    { type:'convo', html:`<strong>Die Gretchenfrage:</strong> "Stell dir vor, dein bester Freund sagt: 'Jordan Peterson hat echt recht, Jungs werden heute benachteiligt.' Was würdest du antworten?" — Es geht darum, eine eigene Position zu üben. Vielleicht so: "In manchen Punkten hat er nicht unrecht. Aber was genau sind seine Lösungen? Und wohin führen die?"` },
    { type:'label', emoji:'🛡️', text:'Abschluss: Drei Fragen als Schutzschild' },
    { type:'card', html:`<p>Merkt euch diese drei Fragen für jeden Inhalt online:</p>
<ol><li><strong>Wer hat das gemacht — und was verkauft er?</strong> Aufmerksamkeit? Kurse? Eine Ideologie? Alle drei?</li><li><strong>Was fehlt?</strong> Welche Perspektive wird ausgeblendet? Warum? Welche Nuance geht verloren?</li><li><strong>Wie fühle ich mich danach?</strong> Wütend? Überlegen? Verängstigt? Einsam-unter-Eingeweihten? Wenn ja — ist das Absicht?</li></ol>` },
    { type:'reflect', label:'Was nimmst du aus dieser Session mit? Besprecht das.' }
  ]
},
{
  id: 4, title: 'Wenn Verunsicherung kippt', subtitle: 'Von Frust zu Extremismus',
  goal: 'Verstehen, wie berechtigte Verunsicherung in Radikalisierung münden kann, und lernen, Warnsignale zu erkennen.',
  blocks: [
    { type:'label', emoji:'🗺️', text:'Einstieg: Die Verunsicherungs-Landkarte' },
    { type:'activity', title:'Gedankenexperiment (10 Min)', html:'<p>Stellt euch eine Landkarte vor: In der Mitte steht <strong>"ICH"</strong>. Welche Bereiche drumherum machen euch manchmal unsicher? Schule, Freundschaften, Aussehen, Zukunft, Familie, Social Media... Besprecht, was davon am meisten beschäftigt.</p>' },
    { type:'convo', html:'<strong>Gesprächsimpuls:</strong> Unsicherheit ist normal. Jeder Mensch kennt sie. Die Frage ist: Was machst du mit dem Gefühl?' },
    { type:'label', emoji:'📚', text:'Wissensblock: Der Weg von Unsicherheit zu Extremismus' },
    { type:'collapsible', title:'Warum gerade junge Männer?', html:`<p>Es gibt ein echtes Paradox in unserer Gesellschaft: Einerseits sind Frauen heute formal gleichberechtigt, und das ist gut so. Andererseits haben viele junge Männer das Gefühl, dass ihnen niemand sagt, was ihre Rolle eigentlich sein soll. Die alten Modelle funktionieren nicht mehr richtig, aber neue Modelle sind noch nicht klar. Es gibt eine echte "Männlichkeitslücke" — nicht weil Männlichkeit abgeschafft wurde, sondern weil die alten Bilder nicht mehr tragen und niemand etwas Neues anbietet. In dieses Vakuum stoßen die Bewegungen aus Session 3.</p>
<p>Dazu kommt: Jungs werden in der Schule oft seltener individuell gefördert, erhalten weniger emotionale Unterstützung. In Deutschland machen deutlich mehr Mädchen Abitur als Jungs. Die Suizidrate bei jungen Männern ist erschreckend hoch — dreimal so hoch wie bei Frauen. Das sind reale Probleme, die ernst genommen werden müssen.</p>` },
    { type:'collapsible', title:'Pfad 1: Der Leistungs-Pfad (Grindset → Verachtung)', html:`<p>Du fängst an mit dem Wunsch, erfolgreich zu sein. Du schaust Motivationsvideos. Dann lernst du, dass "echte" Männer Millionäre sind. Du arbeitest hart, aber der Erfolg kommt nicht. Statt zu erkennen, dass das System komplexer ist, lernst du: "Die anderen sind schuld." Frauen wollen nur dein Geld. Die Gesellschaft hält dich klein. Du beginnst, alle Menschen in "High Value" und "Low Value" einzuteilen — dich selbst eingeschlossen.</p>
<p>Das Ergebnis: Verachtung für andere und Selbsthass, wenn du deine eigenen unrealistischen Maßstäbe nicht erreichst.</p>` },
    { type:'collapsible', title:'Pfad 2: Der Körper-Pfad (Fitness → Dysmorphie → Frauenfeindlichkeit)', html:`<p>Du willst fitter werden — ein guter Impuls. Aber der Algorithmus zeigt dir Influencer mit Steroid-Körpern und behauptet, das sei "natürlich". Du wirst unzufrieden mit deinem eigenen Körper. Du landest bei Looksmaxxing-Content, der dir sagt, dein Gesicht sei "zu schwach". Von dort ist es nicht weit zu Red-Pill-Content, der erklärt: "Frauen wollen nur Männer mit Jawline und Geld."</p>
<p>Das Ergebnis: Dein Körper wird zum Feind, und Frauen werden zur Jury, deren Urteil du fürchtest.</p>` },
    { type:'collapsible', title:'Pfad 3: Der Intellektuellen-Pfad (Selbsthilfe → Ideologie → Überlegenheit)', html:`<p>Du suchst nach Sinn und Orientierung. Du findest einen Psychologen oder Philosophen, der kluge Sachen sagt — "Übernimm Verantwortung", "Sei ehrlich". Dann merkst du nicht, wie die Botschaft sich verschiebt: "Geschlechterhierarchien sind natürlich", "Feminismus hat die Gesellschaft zerstört." Du fühlst dich intellektuell überlegen, weil du die "Wahrheit" erkannt hast.</p>
<p>Das Ergebnis: Du verwechselst Arroganz mit Intelligenz und hörst auf, andere Perspektiven ernst zu nehmen.</p>` },
    { type:'collapsible', title:'Pfad 4: Der Humor-Pfad (Memes → Ironie → Normalisierung)', html:`<p>Du lachst über ein Meme. Dann noch eins. Die Memes werden extremer, aber du lachst weiter — es ist ja nur Spaß. Auf Discord teilst du Bilder, die du vor einem Jahr noch abstoßend gefunden hättest. Du merkst nicht, dass sich dein Kompass verschoben hat, weil alles in Ironie verpackt war.</p>
<p>Das Ergebnis: Du hast keine klare Position mehr, weil du gelernt hast, dass alles "nur ein Witz" ist — auch Frauenhass, Rassismus und Gewalt.</p>` },
    { type:'collapsible', title:'Pfad 5: Der Traditions-Pfad (Sehnsucht → Idealisierung → Rigidität)', html:`<p>Du sehnst dich nach Klarheit und Ordnung. Du findest Content, der eine "einfachere" Zeit verspricht: klare Rollen, die Familie als Zentrum. Das fühlt sich warm und sicher an. Aber: Diese idealisierte Vergangenheit hat es nie gegeben. Und die "klaren Rollen" bedeuten in der Praxis: Frauen verlieren ihre Freiheit, Männer werden auf die Versorger-Rolle reduziert.</p>
<p>Das Ergebnis: Rigidität statt Stabilität — und Feindseligkeit gegen alle, die anders leben wollen.</p>` },
    { type:'collapsible', title:'Was alle Pfade gemeinsam haben', html:`<p>Egal welchen Weg jemand nimmt — am Ende landen viele an einem ähnlichen Ort:</p>
<ul><li>Ein Weltbild, in dem Geschlechter gegeneinander stehen statt miteinander</li><li>Verachtung für Schwäche (bei sich selbst und bei anderen)</li><li>Misstrauen gegen "das System", Medien, Bildung, Institutionen</li><li>Das Gefühl, einer erleuchteten Minderheit anzugehören</li><li>Und oft: Einsamkeit, verkleidet als Unabhängigkeit</li></ul>` },
    { type:'collapsible', title:'Der politische Kontext — Potsdam und Brandenburg', html:`<p>In Brandenburg und ganz Ostdeutschland zeigt sich eine Tendenz: Junge Männer wählen deutlich häufiger rechtsextreme Parteien wie die AfD als junge Frauen. Bei der Europawahl 2024 war die AfD bei jungen Männern zwischen 16 und 24 die stärkste Partei.</p>
<p>Die AfD nutzt exakt dieselben Mechanismen wie das Männlichkeits-Ökosystem:</p>
<ul><li><strong>Echte Probleme, falsche Antworten:</strong> "Jobs werden weniger, Mieten steigen" — alles real. Die AfD-Antwort: "Die Ausländer sind schuld."</li>
<li><strong>Männlichkeit als politisches Versprechen:</strong> Die AfD inszeniert sich als Partei der "echten Männer" — gegen "Genderideologie", gegen "woke Eliten".</li>
<li><strong>Provokation als Markenzeichen:</strong> "Das wird man ja wohl noch sagen dürfen" — derselbe Mechanismus wie die Meme-Kultur.</li>
<li><strong>Die Spirale von Online zu Offline:</strong> Studien zeigen, dass der Konsum von Manosphere-Content einer der stärksten Prädiktoren für rechtsextremes Wahlverhalten bei jungen Männern ist.</li></ul>` },
    { type:'collapsible', title:'Internationale Dimension', html:`<p>Das ist kein deutsches Problem. In den USA wählen junge Männer zunehmend republikanisch, in Südkorea gibt es eine massive antifeministische Bewegung unter jungen Männern, in Italien und Frankreich dasselbe Muster. Die Verunsicherung junger Männer ist global — und die Antworten, die sie im Internet finden, sind es auch.</p>` },
    { type:'quote', text:'Verunsicherung ist menschlich. Die Probleme, die junge Männer haben, sind real. Aber wer dir sagt, dass andere Menschen schuld an deinen Problemen sind — egal ob Frauen, Migranten, "die Elite" oder "das System" — der will dich nicht stärken. Der will dich benutzen. Für Klicks. Für Geld. Für Wählerstimmen.' },
    { type:'label', emoji:'⚠️', text:'Aktivität: Warnsignale erkennen' },
    { type:'collapsible', title:'Teil 1: Warnsignale im Verhalten', html:`<ul><li>"Alle Frauen sind so und so" / "Alle Männer sind so und so" (pauschale Aussagen)</li>
<li>"Die Wahrheit wird unterdrückt" (Verschwörungsdenken)</li>
<li>"Ich bin ein Opfer des Systems" (Opferrolle als Selbstbild)</li>
<li>"Nur wir verstehen die Realität" (Abschottung)</li>
<li>"Das darf man ja nicht mehr sagen" (Provokation als Selbstzweck)</li>
<li>Zunehmendes Misstrauen gegenüber Freunden, Familie, Lehrern</li>
<li>Rückzug in eine bestimmte Online-Community</li>
<li>Das Gefühl, "aufgewacht" zu sein, während alle anderen "schlafen"</li></ul>` },
    { type:'collapsible', title:'Teil 2: Warnsignale im Sprachgebrauch', html:`<p>Neue Wörter können ein Signal sein:</p>
<ul><li>"alpha", "beta", "sigma", "high value", "low value"</li>
<li>"based", "red-pilled", "blue-pilled", "cope", "NPC"</li>
<li>"the matrix", "clown world"</li>
<li>"grindset", "no excuses", "level up"</li>
<li>"body count", "hypergamy", "the wall"</li></ul>
<p>Wenn du oder ein Freund plötzlich diese Sprache benutzt, ist das kein Beweis für Radikalisierung — aber ein Signal, genauer hinzuschauen.</p>` },
    { type:'collapsible', title:'Teil 3: Was tun, wenn ein Freund abdriftet?', html:`<ul><li><strong>Nicht angreifen, sondern nachfragen:</strong> "Woher hast du das? Was genau meinst du damit?" Fragen sind mächtiger als Belehrungen.</li>
<li><strong>Die Person von der Idee trennen:</strong> "Ich mag dich. Aber was du gerade sagst, macht mir Sorgen."</li>
<li><strong>Nicht aufgeben:</strong> Radikalisierung passiert oft, weil Menschen sich isoliert fühlen. Kontakt abbrechen bestätigt das Narrativ.</li>
<li><strong>Hilfe holen:</strong> Wenn jemand Gewaltfantasien äußert oder sich komplett zurückzieht — sprich mit einem Erwachsenen. Das ist kein Verrat. Das ist Fürsorge.</li></ul>` },
    { type:'convo', html:'<strong>Gesprächsfrage:</strong> Was würdest du tun, wenn du merkst, dass ein Freund sich verändert und immer extremere Dinge sagt?' },
    { type:'label', emoji:'🏛️', text:'Exkurs: Politische Mündigkeit' },
    { type:'card', html:`<p>In einer Demokratie hat jeder das Recht auf seine Meinung — auch eine unbequeme. Und: Nicht jeder, der konservative Werte hat, ist extremistisch. Nicht jeder, der sagt, dass Jungs es manchmal schwer haben, ist ein Frauenfeind. Die Grenze verläuft nicht zwischen links und rechts, sondern zwischen differenziertem Denken und Schwarz-Weiß-Denken.</p>
<p>Politische Mündigkeit bedeutet:</p>
<ul><li>Zu prüfen, woher deine Meinung kommt (Hast du sie selbst gebildet — oder hat ein Algorithmus sie dir gefüttert?)</li>
<li>Andere Perspektiven anzuhören, bevor du urteilst</li>
<li>Zwischen Fakten und Gefühlen unterscheiden zu können — und beides ernst zu nehmen</li>
<li>Bereit zu sein, deine Meinung zu ändern, wenn du neue Informationen bekommst</li>
<li>Zu erkennen, wenn jemand deine Meinung als Werkzeug benutzt — für Klicks, Geld oder Macht</li></ul>` },
    { type:'label', emoji:'🪞', text:'Abschluss' },
    { type:'reflect', label:'Formuliert zusammen einen Kompass-Satz, z.B.: "Wenn mir jemand sagt, wer mein Feind ist, frage ich zuerst: Was hat diese Person davon, dass ich das glaube?"' }
  ]
},
{
  id: 5, title: 'Stark auf die gute Art', subtitle: 'Gesunde Männlichkeit und echte Beziehungen',
  goal: 'Ein positives Bild von Männlichkeit entwickeln, das auf Respekt, Verantwortung und echten Verbindungen basiert.',
  blocks: [
    { type:'label', emoji:'🌟', text:'Einstieg: Der beste Mann, den ich kenne' },
    { type:'activity', title:'Übung (10 Min)', html:'<p>Jeder denkt an einen Mann (real, nicht fiktiv), den er wirklich respektiert. Das kann der Opa sein, ein Trainer, ein Lehrer, ein Nachbar. Beschreibt: Was macht ihn zu einem guten Mann?</p>' },
    { type:'convo', html:'<strong>Gesprächsimpuls:</strong> Tauchen in euren Beschreibungen Worte wie "reich", "stark", "dominant" auf? Oder eher "zuverlässig", "lustig", "hört zu", "fair"?' },
    { type:'label', emoji:'💪', text:'Wissensblock: Was gesunde Männlichkeit bedeuten kann' },
    { type:'card', html:`<p>Es gibt nicht DIE Männlichkeit — und das ist eine gute Nachricht.</p>
<p>Männlichkeit ist kein einzelner Bauplan. Die Forschung zeigt, dass "positive Männlichkeit" gemeinsame Merkmale hat:</p>
<ul><li><strong>Emotionale Offenheit:</strong> Wissen, was in dir vorgeht.</li>
<li><strong>Verantwortung übernehmen:</strong> Fehler zugeben können, ohne dich selbst zu zerstören.</li>
<li><strong>Fürsorge:</strong> Sich um andere kümmern — keine "weibliche" Eigenschaft, sondern menschlich.</li>
<li><strong>Integrität:</strong> Deine Werte auch dann leben, wenn es unbequem ist.</li>
<li><strong>Verbindung:</strong> Echte Freundschaften, in denen du ehrlich sein kannst.</li></ul>` },
    { type:'collapsible', title:'Warum Respekt keine Einbahnstraße ist', html:`<p>Geschlechtergerechtigkeit heißt nicht: "Mädchen sind besser als Jungs." Es heißt: Alle Menschen verdienen den gleichen Respekt, die gleichen Chancen und die gleiche Freiheit.</p>
<p>Das gilt auch für dich. Wenn dir jemand sagt, du bist "toxisch", nur weil du ein Junge bist — dann ist das genauso unfair wie wenn jemand ein Mädchen auf ihr Aussehen reduziert. Geschlechtergerechtigkeit schützt alle.</p>` },
    { type:'collapsible', title:'Freundschaften zwischen Jungs', html:`<p>Eine der größten Herausforderungen für Jungs in deinem Alter: echte, tiefe Freundschaften aufbauen. Studien zeigen, dass Jungs ab etwa 12 Jahren anfangen, ihre Freundschaften "abzuflachen" — sie sprechen weniger über Gefühle, halten mehr Distanz. Nicht weil sie das wollen, sondern weil sie Angst haben, als "weich" zu gelten.</p>
<p>Das Ergebnis: Einsamkeit. Und Einsamkeit ist einer der stärksten Faktoren, die anfällig für Radikalisierung machen.</p>
<p>Die Gegenstrategie: Da sein, wenn es drauf ankommt. Nachfragen, wenn jemand still wird. Sagen können: "Mir geht's gerade nicht gut."</p>` },

<ul><li>Niemand "gehört" dir</li><li>"Nein" ist ein vollständiger Satz und verdient immer Respekt</li><li>Echte Anziehung hat nichts mit Tricks oder Manipulation zu tun</li><li>Verliebt sein kann großartig sein — und wehtun. Beides ist okay</li></ul>` },
    { type:'quote', text:'Ein starker Mann ist nicht jemand, der andere klein macht. Es ist jemand, der stark genug ist, andere neben sich wachsen zu lassen.' },

let state = loadState();
function loadState() {
  try { const s = JSON.parse(localStorage.getItem(SK)||'{}'); return { completed: s.completed||[], currentSession: null }; }
  catch { return { completed: [], currentSession: null }; }
}
function saveState() { localStorage.setItem(SK, JSON.stringify({ completed: state.completed })); }

function render() {
  const app = document.getElementById('app');
  if (state.currentSession) { app.innerHTML = renderSession(state.currentSession); bindSession(); }
  else { app.innerHTML = renderOverview(); bindOverview(); }
}

function renderOverview() {
  const done = state.completed.length, pct = Math.round((done/sessions.length)*100);
  return `<div class="header"><div class="header-icon">🎭</div><h1>Stark ohne Maske</h1><p>Geschlechtergerechtigkeit, Männlichkeit & Social Media<br>6 Sessions für Eltern und Söhne</p></div>
<div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
<div class="progress-label">${done} von ${sessions.length} Sessions abgeschlossen</div>
<div class="session-list">${sessions.map(s=>{const d=state.completed.includes(s.id);return`<div class="session-card ${d?'completed':''}" data-id="${s.id}" tabindex="0" role="button"><div class="session-num">${d?'✓':s.id}</div><div class="session-info"><div class="session-name">${s.title}</div><div class="session-desc">${s.subtitle}</div></div><div class="session-badge">${d?'🏆':'→'}</div></div>`;}).join('')}</div>
<div class="footer">Stark ohne Maske — LernHub Familie Grimm</div>`;
}

function renderSession(id) {
  const s = sessions.find(x=>x.id===id); if(!s)return'';
  const d = state.completed.includes(s.id);
  return `<button class="back-btn" id="back"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>Übersicht</button>
<div class="session-header"><span class="num-badge">Session ${s.id} von 6</span><h2>${s.title}</h2><div class="goal">${s.goal}</div></div>
${s.blocks.map(renderBlock).join('')}
<button class="complete-btn ${d?'done':''}" id="complete-btn">${d?'✓ Session abgeschlossen':'Session als erledigt markieren'}</button>`;
}

function renderBlock(b) {
  switch(b.type) {
    case 'label': return `<div class="block-label"><span class="emoji">${b.emoji}</span> ${b.text}</div>`;
    case 'card': return `<div class="card">${b.html}</div>`;
    case 'quote': return `<div class="quote">${b.text}</div>`;
    case 'activity': return `<div class="activity"><h3>${b.title}</h3>${b.html}</div>`;
    case 'convo': return `<div class="convo">${b.html}</div>`;
    case 'collapsible': return `<button class="collapsible-toggle" data-col><span>${b.title}</span><span class="arrow">▶</span></button><div class="collapsible-content"><div class="card">${b.html}</div></div>`;
    case 'reflect': return `<div class="reflect-prompt"><strong>Zum Nachdenken:</strong> ${b.label}</div>`;
    default: return '';
  }
}

function bindOverview() {
  document.querySelectorAll('.session-card').forEach(c=>{
    const h=()=>{state.currentSession=+c.dataset.id;render();window.scrollTo(0,0);};
    c.addEventListener('click',h); c.addEventListener('keydown',e=>{if(e.key==='Enter')h();});
  });
}
function bindSession() {
  document.getElementById('back').addEventListener('click',()=>{state.currentSession=null;render();window.scrollTo(0,0);});
  document.querySelectorAll('[data-col]').forEach(btn=>{btn.addEventListener('click',()=>{btn.classList.toggle('open');btn.nextElementSibling.classList.toggle('open');});});
  document.getElementById('complete-btn').addEventListener('click',()=>{const id=state.currentSession;if(!state.completed.includes(id)){state.completed.push(id);saveState();render();window.scrollTo(0,document.body.scrollHeight);}});
}
render();
</script>
