<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stark ohne Maske</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0f172a; --surface: #1e293b; --surface2: #334155;
      --text: #f1f5f9; --muted: #94a3b8; --accent: #8b5cf6;
      --accent2: #a78bfa; --warm: #f59e0b; --green: #22c55e;
      --radius: 14px;
    }
    html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', system-ui, sans-serif; background: var(--bg); color: var(--text); }
    body { overflow-y: auto; -webkit-overflow-scrolling: touch; }
    .app { max-width: 640px; margin: 0 auto; padding: 20px 16px 40px; min-height: 100vh; }

    /* Header */
    .header { text-align: center; margin-bottom: 28px; }
    .header-icon { font-size: 48px; margin-bottom: 8px; }
    .header h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
    .header p { color: var(--muted); font-size: 13px; line-height: 1.5; }

    /* Progress */
    .progress-bar { background: var(--surface); border-radius: 8px; height: 8px; margin-bottom: 24px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 8px; transition: width 0.5s ease; }
    .progress-label { text-align: center; font-size: 12px; color: var(--muted); margin-top: -18px; margin-bottom: 20px; }

    /* Session list */
    .session-list { display: flex; flex-direction: column; gap: 12px; }
    .session-card {
      background: var(--surface); border-radius: var(--radius); padding: 16px 18px;
      display: flex; align-items: center; gap: 14px; cursor: pointer;
      border: 1px solid transparent; transition: all 0.2s;
    }
    .session-card:hover, .session-card:focus { background: var(--surface2); border-color: var(--accent); outline: none; }
    .session-card.completed { border-left: 3px solid var(--green); }
    .session-num {
      width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 15px; flex-shrink: 0;
      background: rgba(139,92,246,0.15); color: var(--accent2);
    }
    .session-card.completed .session-num { background: rgba(34,197,94,0.15); color: var(--green); }
    .session-info { flex: 1; min-width: 0; }
    .session-name { font-weight: 600; font-size: 15px; margin-bottom: 2px; }
    .session-desc { font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .session-badge { font-size: 18px; flex-shrink: 0; }

    /* Session view */
    .session-view { display: none; }
    .session-view.active { display: block; }
    .back-btn {
      background: none; border: none; color: var(--accent2); font-size: 14px; font-weight: 600;
      cursor: pointer; padding: 8px 0; margin-bottom: 16px; display: flex; align-items: center; gap: 6px;
    }
    .back-btn svg { width: 18px; height: 18px; }
    .session-header { margin-bottom: 24px; }
    .session-header .num-badge {
      display: inline-block; background: rgba(139,92,246,0.15); color: var(--accent2);
      font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 12px; margin-bottom: 8px;
    }
    .session-header h2 { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
    .session-header .goal { font-size: 13px; color: var(--muted); line-height: 1.5; }

    /* Blocks */
    .block-label {
      font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
      color: var(--accent2); margin: 28px 0 12px; display: flex; align-items: center; gap: 6px;
    }
    .block-label:first-child { margin-top: 0; }
    .block-label .emoji { font-size: 14px; }

    .card {
      background: var(--surface); border-radius: var(--radius); padding: 16px 18px;
      margin-bottom: 12px; line-height: 1.7; font-size: 14px;
    }
    .card h3 { font-size: 15px; font-weight: 700; margin-bottom: 8px; }
    .card h4 { font-size: 14px; font-weight: 700; margin: 14px 0 6px; color: var(--accent2); }
    .card p { margin-bottom: 12px; }
    .card p:last-child { margin-bottom: 0; }
    .card ul, .card ol { padding-left: 20px; margin-bottom: 12px; }
    .card li { margin-bottom: 8px; line-height: 1.6; }

    .quote {
      background: linear-gradient(135deg, rgba(139,92,246,0.12), rgba(245,158,11,0.08));
      border-left: 3px solid var(--accent);
      border-radius: 0 var(--radius) var(--radius) 0;
      padding: 16px 18px; font-size: 15px; font-weight: 500; line-height: 1.6;
      font-style: italic; margin-bottom: 16px;
    }
    .activity {
      background: rgba(245,158,11,0.08); border: 1px solid rgba(245,158,11,0.2);
      border-radius: var(--radius); padding: 16px 18px; margin-bottom: 12px;
    }
    .activity h3 { color: var(--warm); font-size: 14px; margin-bottom: 8px; }
    .activity p, .activity li { font-size: 13px; line-height: 1.65; }
    .activity ul, .activity ol { padding-left: 20px; margin-top: 8px; }
    .activity li { margin-bottom: 6px; }

    .convo {
      background: rgba(34,197,94,0.08); border: 1px solid rgba(34,197,94,0.2);
      border-radius: var(--radius); padding: 14px 16px; margin-bottom: 12px; font-size: 13px; line-height: 1.6;
    }
    .convo strong { color: var(--green); }

    .reflect-prompt {
      background: linear-gradient(135deg, rgba(139,92,246,0.08), rgba(34,197,94,0.06));
      border: 1px solid rgba(139,92,246,0.2); border-radius: var(--radius);
      padding: 14px 16px; margin-bottom: 16px; font-size: 13px; line-height: 1.6;
    }
    .reflect-prompt strong { color: var(--accent2); }

    /* Collapsible */
    .collapsible-toggle {
      background: var(--surface); border: 1px solid var(--surface2); border-radius: var(--radius);
      padding: 14px 16px; width: 100%; text-align: left; color: var(--text); font-size: 14px;
      font-weight: 600; cursor: pointer; display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 2px; transition: background 0.2s;
    }
    .collapsible-toggle:hover { background: var(--surface2); }
    .collapsible-toggle .arrow { transition: transform 0.2s; font-size: 12px; color: var(--muted); }
    .collapsible-toggle.open .arrow { transform: rotate(90deg); }
    .collapsible-content { display: none; padding: 4px 0 12px; }
    .collapsible-content.open { display: block; }

    .complete-btn {
      display: block; width: 100%; padding: 14px; border: none; border-radius: var(--radius);
      background: linear-gradient(135deg, var(--accent), #7c3aed); color: #fff;
      font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 24px; transition: opacity 0.2s;
    }
    .complete-btn:hover { opacity: 0.9; }
    .complete-btn.done { background: var(--green); }
    .footer { text-align: center; padding: 30px 0 10px; font-size: 11px; color: var(--surface2); }
  </style>
</head>
<body>
<div class="app" id="app"></div>
<script>
const SK = 'starkOhneMaskeProgress';
const sessions = [
{
  id: 1, title: 'Wie es wurde, wie es ist', subtitle: 'Geschlechterrollen im Wandel der Zeit',
  goal: 'Verstehen, dass Vorstellungen von "männlich" und "weiblich" sich über die Jahrhunderte stark verändert haben und nicht in Stein gemeißelt sind.',
  blocks: [
    { type:'label', emoji:'💬', text:'Einstieg: Was ist eigentlich "männlich"?' },
    { type:'activity', title:'Übung (10 Min)', html:'<p>Überlegt euch jeweils fünf Antworten auf: <strong>"Ein richtiger Mann ist jemand, der..."</strong> — und vergleicht eure Antworten.</p>' },
    { type:'convo', html:'<strong>Gesprächsimpuls:</strong> Woher kommen diese Ideen? Wer hat dir das beigebracht — Schule, Freunde, Filme, TikTok, Familie?' },
    { type:'label', emoji:'📚', text:'Wissensblock: Eine Reise durch die Geschichte' },
    { type:'collapsible', title:'Steinzeit und Antike', html:`<p>In der Frühgeschichte der Menschheit gab es tatsächlich eine gewisse Arbeitsteilung — aber sie war viel flexibler als man oft denkt. Archäologische Funde zeigen, dass auch Frauen jagten und Männer sich um Kinder kümmerten. Die starren Rollen, die wir heute als "natürlich" empfinden, sind viel jünger als die Menschheit selbst.</p>
<p>Im antiken Griechenland galten Männer, die weinten, als besonders ehrenhaft — Odysseus weint in Homers Erzählungen ständig, und niemand fand das schwach. Gleichzeitig hatten Frauen in Athen kaum Rechte. Männlichkeit bedeutete damals also etwas völlig anderes als heute.</p>` },
    { type:'collapsible', title:'Mittelalter und Ritterzeit', html:`<p>Das Ritterideal verlangte von Männern Tapferkeit, aber auch Höflichkeit, Dichtkunst und Gefühlsausdruck. Ein Ritter, der nicht über Liebe dichten konnte, galt als unvollständig.</p>
<p>Gleichzeitig war die Gesellschaft zutiefst ungleich — die allermeisten Männer waren arme Bauern, deren "Männlichkeit" niemanden interessierte.</p>` },
    { type:'collapsible', title:'Industrialisierung (ab ca. 1800)', html:`<p>Erst mit der Industrialisierung entstand das Modell, das viele heute als "traditionell" empfinden: Der Mann geht arbeiten, die Frau bleibt zu Hause. Vorher arbeiteten die meisten Familien zusammen — auf dem Feld, in der Werkstatt.</p>
<p>Das "klassische" Familienmodell ist also gerade einmal 200 Jahre alt.</p>` },
    { type:'collapsible', title:'20. Jahrhundert — DDR und BRD', html:`<p>Hier wird es besonders spannend für Potsdam: In der DDR war es selbstverständlich, dass Frauen arbeiten gingen. Fast 90% der Frauen waren berufstätig. Männer in der DDR erlebten Frauen im Berufsleben als Normalität.</p>
<p>In der BRD war das lange anders — dort dominierte das Modell der Hausfrau bis in die 1970er Jahre. Bis 1977 konnte ein Ehemann in der BRD seiner Frau verbieten, arbeiten zu gehen. Das ist keine uralte Geschichte — das war vor weniger als 50 Jahren.</p>` },
    { type:'collapsible', title:'Heute', html:`<p>Formal sind Männer und Frauen gleichberechtigt. Aber in der Praxis gibt es weiterhin Unterschiede: beim Gehalt (Gender Pay Gap), bei der Verteilung von Hausarbeit und Kinderbetreuung, bei der Frage, wer in Führungspositionen sitzt.</p>
<p>Gleichzeitig hat sich enorm viel verändert — und die Veränderung geht weiter.</p>` },
    { type:'quote', text:'Männlichkeit ist kein feststehendes Ding. Was als "männlich" gilt, hat sich in jeder Epoche verändert. Das bedeutet: Auch du hast die Freiheit, selbst zu definieren, was für dich ein guter Mann sein heißt.' },
    { type:'label', emoji:'✏️', text:'Aktivität: Die Zeitstrahl-Übung' },
    { type:'activity', title:'Zeitstrahl-Quiz (15 Min)', html:'<p>Ratet mal — wann war was? Dann schaut euch die Antworten an:</p><ul><li>Frauenwahlrecht in Deutschland: <strong>1918</strong></li><li>Frauenwahlrecht in der Schweiz: <strong>1971!</strong></li><li>Frauen dürfen ohne Erlaubnis des Mannes arbeiten: <strong>1977</strong></li><li>Elternzeit für Väter in Deutschland: <strong>2007</strong></li></ul>' },
    { type:'convo', html:'<strong>Gesprächsfrage:</strong> Was davon hat dich überrascht? Was wird sich wohl in den nächsten 50 Jahren noch verändern?' },
    { type:'label', emoji:'🪞', text:'Abschluss' },
    { type:'reflect', label:'"Ich wusste nicht, dass..." — Vervollständigt den Satz gemeinsam.' }
  ]
},
{
  id: 2, title: 'Was in deinem Kopf passiert', subtitle: 'Psychologie der Männlichkeit',
  goal: 'Verstehen, warum sich Jungs oft unter Druck gesetzt fühlen, bestimmte Erwartungen zu erfüllen — und lernen, dass Verletzlichkeit keine Schwäche ist.',
  blocks: [
    { type:'label', emoji:'🎭', text:'Einstieg: Die Masken-Übung' },
    { type:'activity', title:'Gedankenexperiment (10 Min)', html:'<p>Stellt euch vor, ihr habt zwei Gesichter: Eines, das ihr der Welt zeigt, und eines, das nur ihr selbst kennt. Welche Gefühle zeigt ihr nach außen? Welche versteckt ihr? Besprecht das.</p>' },
    { type:'convo', html:'<strong>Gesprächsimpuls:</strong> Gibt es Gefühle, die du dir nicht erlaubst zu zeigen? Warum?' },
    { type:'label', emoji:'🧠', text:'Wissensblock: Warum Jungs sich oft so verhalten' },
    { type:'collapsible', title:'Die "Man Box"', html:`<p>Forscher haben ein Konzept entwickelt, das sie die "Man Box" nennen. Es beschreibt die unsichtbaren Regeln, die Jungs und Männer einengen:</p>
<ul><li><strong>Sei stark, zeig keine Schwäche</strong></li><li><strong>Kontrolliere deine Gefühle</strong> (außer Wut — die ist erlaubt)</li><li><strong>Sei dominant,</strong> nicht unterwürfig</li><li><strong>Sei sexuell erfahren</strong></li><li><strong>Verdien Geld,</strong> sei erfolgreich</li><li><strong>Bitte nicht um Hilfe</strong></li></ul>
<p>Diese Regeln lernen Jungs nicht in einem einzigen Moment. Sie sickern ein — durch Sprüche auf dem Schulhof ("Heul nicht, du Mädchen!"), durch Filme, durch Social Media, durch Vorbilder.</p>
<p>Das Problem: Jungs, die sich streng an diese Regeln halten, haben nachweislich häufiger psychische Probleme, sind häufiger einsam und haben schlechtere Beziehungen.</p>` },
    { type:'collapsible', title:'Was Pubertät mit deinem Gehirn macht', html:`<p>Mit 12 bist du mitten in einer Phase, in der dein Gehirn sich komplett umbaut. Der präfrontale Kortex — der Teil, der für vorausschauendes Denken, Impulskontrolle und das Abwägen von Konsequenzen zuständig ist — ist erst mit Mitte 20 vollständig entwickelt. Gleichzeitig sind die emotionalen Zentren im Gehirn (die Amygdala) auf Hochtouren.</p>
<p>Das bedeutet: Starke Gefühle, Unsicherheit, Wut, Sehnsucht nach Zugehörigkeit — das ist nicht deine Schwäche. Das ist Biologie. Und es ist völlig normal.</p>` },
    { type:'collapsible', title:'Warum Zugehörigkeit so wichtig ist', html:`<p>Menschen sind soziale Wesen. In der Pubertät wird das Bedürfnis nach Zugehörigkeit besonders stark. Du willst dazugehören, respektiert werden, nicht ausgeschlossen sein.</p>
<p>Genau dieses Bedürfnis nutzen bestimmte Online-Communities aus: Sie bieten dir eine Gruppe, eine Identität, einfache Antworten. Aber dazu mehr in Session 3.</p>` },
    { type:'collapsible', title:'Emotionale Intelligenz — die wahre Stärke', html:`<p>Studien zeigen: Männer, die ihre Gefühle benennen und ausdrücken können, sind nicht schwächer — sie sind resilienter. Sie haben stabilere Freundschaften, bessere Beziehungen und sind psychisch gesünder.</p>
<p>Die Fähigkeit, über Gefühle zu sprechen, ist keine "Mädchensache" — sie ist ein Überlebenswerkzeug.</p>` },
    { type:'quote', text:'Sich verletzlich zu zeigen erfordert mehr Mut als eine harte Fassade aufzusetzen. Echte Stärke heißt, zu wissen, was du fühlst — und es auch sagen zu können.' },
    { type:'label', emoji:'✏️', text:'Aktivität: Das Gefühlsvokabular' },
    { type:'activity', title:'Gefühlsvokabular sammeln (15 Min)', html:'<p>Versucht gemeinsam, so viele Gefühlswörter wie möglich zu sammeln. Startet mit den offensichtlichen (glücklich, traurig, wütend) und dann feiner: <em>enttäuscht, beschämt, überfordert, eifersüchtig, stolz, dankbar, verlegen, sehnsüchtig...</em></p><p>Wer mehr Wörter für Gefühle hat, kann seine innere Welt besser verstehen. Das klingt simpel — ist aber ein echter Gamechanger.</p>' },
    { type:'convo', html:'<strong>Gesprächsfrage:</strong> Welches dieser Gefühle hast du in der letzten Woche erlebt, ohne es jemandem zu sagen?' },
    { type:'label', emoji:'💡', text:'Exkurs: Männliche Vorbilder' },
    { type:'card', html:`<p>Denkt gemeinsam nach: Welche Männer bewunderst du? Das können reale Menschen sein oder Figuren aus Filmen und Serien. Was genau bewunderst du an ihnen? Und dann die Gegenfrage: Welche Eigenschaften haben sie, die <em>nicht</em> in die "Man Box" passen?</p>
<p>Beispiel: Viele Jungs bewundern Sportler. Aber gerade im Profisport sprechen immer mehr Männer offen über psychische Gesundheit — Per Mertesacker über seine Angst vor Spielen, Michael Phelps über Depressionen. Ist das schwach? Oder mutig?</p>` },
    { type:'label', emoji:'🪞', text:'Abschluss' },
    { type:'reflect', label:'Stell dir vor, du könntest deinem 16- oder 18-jährigen Ich eine Nachricht schicken. Was würdest du sagen? Besprecht das.' }
  ]
},
{
  id: 3, title: 'Die Welt in deinem Handy', subtitle: 'Social Media und die Manosphere',
  goal: 'Verstehen, wie Social-Media-Algorithmen funktionieren, was die Manosphere ist und wie man manipulative Inhalte erkennt.',
  blocks: [
    { type:'label', emoji:'📱', text:'Einstieg: Dein Feed, deine Welt' },
    { type:'convo', html:'<strong>Gesprächsimpuls:</strong> Wenn du Videos bei YouTube schaust oder bei Freunden am Handy mitguckst — welche Inhalte siehst du am häufigsten? Hast du schon mal gemerkt, dass bestimmte Themen immer wieder auftauchen?' },
    { type:'label', emoji:'🔍', text:'Wissensblock: Wie du zum Produkt wirst' },
    { type:'collapsible', title:'Wie Algorithmen funktionieren', html:`<p>Social-Media-Plattformen wie TikTok, YouTube und Instagram verdienen Geld, wenn du möglichst lange auf der App bleibst. Dafür setzen sie Algorithmen ein — Programme, die lernen, was dich fesselt, und dir immer mehr davon zeigen.</p>
<p>Das Problem: Algorithmen bevorzugen Inhalte, die starke Emotionen auslösen. Und die stärksten Emotionen sind Wut, Empörung und Angst. Das bedeutet: Dein Feed zeigt dir nicht die Wahrheit. Er zeigt dir das, was dich am meisten triggert.</p>
<p>Auch wenn du selbst noch kein Social Media hast: Du wirst diese Inhalte trotzdem kennenlernen — bei Freunden, in der Schule, auf YouTube. Wenn jemand einmal ein Video über "Alpha Males" oder "Frauen verstehen" anklickt — selbst aus Neugier —, merkt sich das der Algorithmus. Innerhalb weniger Tage kann sich der Feed komplett verändern. Das nennt man den <strong>"Rabbit Hole"-Effekt</strong>. Gut, das vorher zu verstehen.</p>` },
    { type:'collapsible', title:'Was ist die Manosphere?', html:`<p>Die Manosphere ist ein Sammelbegriff für Online-Communities, die sich um Männlichkeit, Frauenfeindlichkeit und Geschlechterverhältnisse drehen. Sie besteht aus verschiedenen Gruppen:</p>
<h4>Red Pill</h4><p>Glauben, dass Feminismus Männer unterdrückt und die "Wahrheit" über Geschlechterrollen verschleiert wird. Der Name kommt aus dem Film "Matrix" — die rote Pille zeigt dir angeblich die harte Realität.</p>
<h4>Pick-Up-Artists (PUA)</h4><p>Männer, die Techniken lehren, um Frauen zu "erobern". Behandeln Frauen als Objekte, die man mit den richtigen Tricks "bekommt".</p>
<h4>MGTOW ("Men Going Their Own Way")</h4><p>Männer, die sich komplett von Beziehungen mit Frauen zurückziehen — angeblich aus freier Wahl, tatsächlich oft aus Frustration und Enttäuschung.</p>
<h4>Incels ("Involuntary Celibates")</h4><p>Männer, die sich als Opfer sehen, weil sie keine Partnerin finden. In dieser Szene gibt es teils extreme Frauenfeindlichkeit bis hin zu Gewaltverherrlichung.</p>` },
    { type:'collapsible', title:'Die Playbook-Taktiken — wie sie dich reinziehen', html:`<h4>1. Sie starten mit echten Problemen</h4>
<p>"Jungs haben es heute schwer", "Niemand kümmert sich um Männer" — das sind Sätze, die einen wahren Kern haben. Jungs und Männer haben tatsächlich Probleme: höhere Suizidrate, weniger emotionale Unterstützung, sinkende Bildungsabschlüsse. Die Manosphere greift diese echten Probleme auf — aber bietet die falschen Lösungen.</p>
<h4>2. Sie bieten einfache Erklärungen</h4>
<p>"Frauen sind schuld", "Feminismus hat alles kaputt gemacht", "Die Gesellschaft hasst Männer". Einfache Feindbilder für komplexe Probleme.</p>
<h4>3. Sie verkaufen ein Upgrade-Versprechen</h4>
<p>"Werde ein Alpha", "Werde ein High-Value-Man", "Verdiene 10K im Monat und Frauen werden dich lieben". Das spricht direkt das Bedürfnis nach Kontrolle und Anerkennung an.</p>
<h4>4. Sie isolieren dich</h4>
<p>"Vertraue nur uns", "Die Mainstream-Medien lügen", "Deine Eltern verstehen das nicht". Je mehr du dich nur in diesen Welten bewegst, desto normaler werden extreme Ansichten.</p>` },
    { type:'collapsible', title:'Wichtige Figuren (Stand 2025/26)', html:`<p>Namen wie Andrew Tate sind dir vielleicht bekannt. Tate wurde wegen Menschenhandel und Vergewaltigung angeklagt. Trotzdem hat er Millionen von Fans unter jungen Männern.</p>
<p>Warum? Weil er Dinge ausspricht, die sich für verunsicherte Jungs wie Wahrheiten anfühlen: "Die Welt ist unfair zu Männern." Das stimmt teilweise — aber seine "Lösung" ist toxisch: Frauen dominieren, Geld als Maßstab für Wert, Gewalt als Stärke.</p>` },
    { type:'quote', text:'Wenn jemand dir online einfache Antworten auf komplizierte Fragen gibt — sei misstrauisch. Die Welt ist komplex. Jeder, der dir sagt "Es ist ganz einfach", will meistens etwas von dir: deine Aufmerksamkeit, dein Geld oder deine Überzeugung.' },
    { type:'label', emoji:'✏️', text:'Aktivität: Der Algorithmus-Check' },
    { type:'activity', title:'Übung (20 Min)', html:'<p>Schaut euch zusammen auf YouTube einen Clip an, der für "Sigma Male Mindset" oder "Alpha Male" wirbt (einfach mal danach suchen). Analysiert gemeinsam:</p><ul><li>Was wird versprochen?</li><li>Welche Emotionen soll das auslösen?</li><li>Wer verdient an diesem Content Geld?</li><li>Welche Beweise werden geliefert? Ist die "Lösung" realistisch?</li><li>Wem nützt es, wenn du das glaubst?</li></ul>' },
    { type:'convo', html:'<strong>Die Gretchenfrage:</strong> "Stell dir vor, dein bester Freund schickt dir ein Video und sagt: \'Der Typ hat echt recht, Feminismus ist das Problem.\' Was würdest du antworten?" — Es geht darum, eine eigene Position zu üben. Nicht "Ja, voll!" und nicht "Nein, du bist dumm!" — sondern: "Was genau meinst du damit? Und woher hat der Typ seine Infos?"' },
    { type:'label', emoji:'🛡️', text:'Abschluss: Drei Fragen als Schutzschild' },
    { type:'card', html:'<p>Merkt euch diese drei Fragen für jeden Inhalt, der euch online begegnet:</p><ol><li><strong>Wer hat das gemacht — und warum?</strong> Will jemand Geld verdienen? Follower gewinnen? Meine Meinung beeinflussen?</li><li><strong>Was fehlt?</strong> Welche Perspektive wird ausgeblendet? Gibt es Gegenargumente?</li><li><strong>Wie fühle ich mich danach?</strong> Wütend? Überlegen? Verängstigt? Wenn ja — ist das Absicht?</li></ol>' },
    { type:'reflect', label:'Was nimmst du aus dieser Session mit? Besprecht das.' }
  ]
},
{
  id: 4, title: 'Wenn Verunsicherung kippt', subtitle: 'Von Frust zu Extremismus',
  goal: 'Verstehen, wie berechtigte Verunsicherung in Radikalisierung münden kann, und lernen, Warnsignale zu erkennen — bei sich selbst und bei anderen.',
  blocks: [
    { type:'label', emoji:'🗺️', text:'Einstieg: Die Verunsicherungs-Landkarte' },
    { type:'activity', title:'Gedankenexperiment (10 Min)', html:'<p>Stellt euch eine Landkarte vor: In der Mitte steht <strong>"ICH"</strong>. Welche Bereiche drumherum machen euch manchmal unsicher? Schule, Freundschaften, Aussehen, Zukunft, Familie, Social Media... Besprecht, was davon am meisten beschäftigt.</p>' },
    { type:'convo', html:'<strong>Gesprächsimpuls:</strong> Unsicherheit ist normal. Jeder Mensch kennt sie. Die Frage ist: Was machst du mit dem Gefühl?' },
    { type:'label', emoji:'📚', text:'Wissensblock: Der Weg von Unsicherheit zu Extremismus' },
    { type:'collapsible', title:'Warum gerade junge Männer?', html:`<p>Es gibt ein echtes Paradox in unserer Gesellschaft: Einerseits sind Frauen heute formal gleichberechtigt, und das ist gut so. Andererseits haben viele junge Männer das Gefühl, dass ihnen niemand sagt, was ihre Rolle eigentlich sein soll. Die alten Modelle ("Mann ernährt Familie") funktionieren nicht mehr richtig, aber neue Modelle sind noch nicht klar.</p>
<p>Dazu kommt: Jungs werden in der Schule oft seltener gefördert, erhalten weniger emotionale Unterstützung und haben weniger Anlaufstellen, wenn sie Hilfe brauchen. Die Suizidrate bei jungen Männern ist erschreckend hoch — in Deutschland sterben dreimal so viele Männer wie Frauen durch Suizid.</p>
<p>Das sind reale Probleme, die ernst genommen werden müssen.</p>` },
    { type:'collapsible', title:'Das Trichter-Modell der Radikalisierung', html:`<p>Stellt euch einen Trichter vor:</p>
<h4>1. Ganz oben (breiter Rand)</h4><p>Normale Verunsicherung. "Wer bin ich? Wo gehöre ich hin? Warum fühle ich mich manchmal so verloren?"</p>
<h4>2. Erste Verengung</h4><p>Jemand bietet Erklärungen an. "Feminismus hat alles kaputt gemacht." "Die Gesellschaft bevorzugt Frauen." Diese Erklärungen fühlen sich plausibel an, weil sie einen wahren Kern haben — aber sie vereinfachen massiv.</p>
<h4>3. Weiter nach unten</h4><p>Du umgibst dich nur noch mit Menschen, die genauso denken. Andere Meinungen werden als "Lügen" oder "Propaganda" abgetan. Du bist in einer Blase.</p>
<h4>4. Unten im Trichter</h4><p>Extreme Ansichten werden normal. Frauenfeindlichkeit, Gewaltfantasien, Verschwörungstheorien. Manche Menschen werden hier zu einer echten Gefahr — für sich selbst und andere.</p>` },
    { type:'collapsible', title:'Der politische Kontext — Potsdam und Brandenburg', html:`<p>In Brandenburg und ganz Ostdeutschland zeigt sich eine Tendenz: Junge Männer wählen deutlich häufiger rechtsextreme Parteien wie die AfD als junge Frauen. Bei der Europawahl 2024 war die AfD bei jungen Männern zwischen 16 und 24 die stärkste Partei.</p>
<p>Warum? Die AfD bietet genau das, was verunsicherte junge Männer suchen: klare Feindbilder ("Ausländer", "Genderideologie", "Eliten"), das Versprechen einer "starken" Ordnung und die Botschaft "Ihr seid die wahren Opfer". Das ist verführerisch — aber es ist eine Falle. Denn die "Lösungen" der AfD machen niemanden stärker. Sie machen die Gesellschaft für alle ärmer.</p>` },
    { type:'collapsible', title:'Manosphere und politischer Extremismus', html:`<p>Die Manosphere und der Rechtsextremismus überschneiden sich an vielen Stellen:</p>
<ul><li>Beide arbeiten mit dem Narrativ <strong>"Männer werden unterdrückt"</strong></li><li>Beide bieten einfache Feindbilder (Frauen, Migranten, "das System")</li><li>Beide versprechen: <strong>"Wir verstehen dich, die anderen nicht"</strong></li><li>Beide nutzen Humor, Memes und Provokation, um extreme Inhalte normal erscheinen zu lassen</li></ul>` },
    { type:'quote', text:'Verunsicherung ist menschlich. Aber wer dir sagt, dass andere Menschen schuld an deinen Problemen sind — egal ob Frauen, Migranten oder "die Elite" — der will dich nicht stärken. Der will dich benutzen.' },
    { type:'label', emoji:'⚠️', text:'Aktivität: Warnsignale erkennen' },
    { type:'card', html:`<p>Geht diese Liste durch und überlegt gemeinsam — welche dieser Warnsignale kennt ihr, bei euch selbst, bei Freunden, online?</p>
<ul><li><strong>"Alle Frauen sind so und so"</strong> — pauschale Aussagen über ganze Gruppen</li><li><strong>"Die Wahrheit wird unterdrückt"</strong> — Verschwörungsdenken</li><li><strong>"Du bist ein Opfer des Systems"</strong> — Opferrolle als Identität</li><li><strong>"Nur wir verstehen die Realität"</strong> — Abschottung von anderen Meinungen</li><li><strong>"Das darf man ja nicht mehr sagen"</strong> — Provokation als Selbstzweck</li><li>Zunehmendes Misstrauen gegenüber Freunden, Familie, Lehrern</li><li>Rückzug in eine bestimmte Online-Community</li></ul>` },
    { type:'convo', html:'<strong>Gesprächsfrage:</strong> Was würdest du tun, wenn du merkst, dass ein Freund sich verändert und immer extremere Dinge sagt?' },
    { type:'label', emoji:'🏛️', text:'Exkurs: Was ist politische Mündigkeit?' },
    { type:'card', html:`<p>In einer Demokratie hat jeder das Recht, seine Meinung zu haben — auch eine unbequeme. Aber politische Mündigkeit bedeutet nicht nur, eine Meinung zu haben. Es bedeutet:</p>
<ul><li>Zu prüfen, <strong>woher</strong> deine Meinung kommt</li><li>Andere Perspektiven <strong>anzuhören</strong>, bevor du urteilst</li><li>Zwischen <strong>Fakten und Gefühlen</strong> unterscheiden zu können</li><li>Bereit zu sein, deine Meinung zu <strong>ändern</strong>, wenn du neue Informationen bekommst</li></ul>
<p>Das ist anstrengender als einfach einer lauten Stimme im Internet zu folgen. Aber es ist der Unterschied zwischen einem mündigen Bürger und jemandem, der benutzt wird.</p>` },
    { type:'label', emoji:'🪞', text:'Abschluss: Der Kompass-Satz' },
    { type:'reflect', label:'Formuliert zusammen einen Satz, den ihr als Kompass mitnehmt — z.B.: "Wenn mir jemand sagt, wer mein Feind ist, frage ich zuerst: Was hat diese Person davon?"' }
  ]
},
{
  id: 5, title: 'Stark auf die gute Art', subtitle: 'Gesunde Männlichkeit und echte Beziehungen',
  goal: 'Ein positives Bild von Männlichkeit entwickeln, das auf Respekt, Verantwortung und echten Verbindungen basiert — nicht auf Dominanz.',
  blocks: [
    { type:'label', emoji:'🌟', text:'Einstieg: Der beste Mann, den ich kenne' },
    { type:'activity', title:'Übung (10 Min)', html:'<p>Jeder denkt an einen Mann (real, nicht fiktiv), den er wirklich respektiert. Das kann der Opa sein, ein Trainer, ein Lehrer, ein Nachbar. Beschreibt: Was macht ihn zu einem guten Mann?</p>' },
    { type:'convo', html:'<strong>Gesprächsimpuls:</strong> Tauchen in euren Beschreibungen Worte wie "reich", "stark", "dominant" auf? Oder eher "zuverlässig", "lustig", "hört zu", "fair"?' },
    { type:'label', emoji:'💪', text:'Wissensblock: Was gesunde Männlichkeit bedeuten kann' },
    { type:'card', html:`<h3>Es gibt nicht DIE Männlichkeit — und das ist eine gute Nachricht</h3>
<p>Männlichkeit ist kein einzelner Bauplan. Es gibt unzählige Wege, ein Mann zu sein. Die Forschung zeigt, dass sogenannte "positive Männlichkeit" einige gemeinsame Merkmale hat:</p>
<ul><li><strong>Emotionale Offenheit:</strong> Die Fähigkeit, Gefühle zu erkennen, zu benennen und mitzuteilen. Nicht: immer alles rauslassen. Sondern: wissen, was in dir vorgeht.</li>
<li><strong>Verantwortung übernehmen:</strong> Nicht für alles und jeden — aber für dein eigenes Handeln. Fehler zugeben können, ohne dich selbst zu zerstören.</li>
<li><strong>Fürsorge:</strong> Sich um andere kümmern — Freunde, Familie, Schwächere. Das ist keine "weibliche" Eigenschaft. Das ist menschlich.</li>
<li><strong>Integrität:</strong> Deine Werte auch dann leben, wenn es unbequem ist. Nicht mitmachen, wenn die Gruppe jemanden fertigmacht, nur weil alle es tun.</li>
<li><strong>Verbindung:</strong> Echte Freundschaften, in denen du ehrlich sein kannst. Nicht nur "Bro-Kultur", in der man zusammen abhängt, aber nie über etwas Echtes spricht.</li></ul>` },
    { type:'collapsible', title:'Warum Respekt keine Einbahnstraße ist', html:`<p>Geschlechtergerechtigkeit heißt nicht: "Mädchen sind besser als Jungs." Es heißt: Alle Menschen verdienen den gleichen Respekt, die gleichen Chancen und die gleiche Freiheit, ihr Leben so zu leben, wie es zu ihnen passt.</p>
<p>Das gilt auch für dich. Wenn dir jemand sagt, du bist "toxisch", nur weil du ein Junge bist — dann ist das genauso unfair wie wenn jemand ein Mädchen auf ihr Aussehen reduziert. Geschlechtergerechtigkeit schützt alle.</p>` },
    { type:'collapsible', title:'Freundschaften zwischen Jungs — das unterschätzte Thema', html:`<p>Eine der größten Herausforderungen für Jungs in deinem Alter: echte, tiefe Freundschaften aufbauen. Studien zeigen, dass Jungs ab etwa 12 Jahren anfangen, ihre Freundschaften "abzuflachen" — sie sprechen weniger über Gefühle, zeigen weniger Zuneigung, halten mehr Distanz. Nicht weil sie das wollen, sondern weil sie Angst haben, als "schwul" oder "weich" zu gelten.</p>
<p>Das Ergebnis: Einsamkeit. Und Einsamkeit ist einer der stärksten Faktoren, die junge Männer anfällig für Radikalisierung machen.</p>
<p>Die Gegenstrategie: Freundschaften pflegen, in denen du ehrlich sein kannst. Das muss nicht bedeuten, stundenlang über Gefühle zu reden. Es kann auch heißen: Da sein, wenn es drauf ankommt. Nachfragen, wenn jemand still wird. Sagen können: "Mir geht's gerade nicht gut."</p>` },
    { type:'collapsible', title:'Beziehungen und Partnerschaft — ein erstes Gespräch', html:`<p>Mit 12 fängt man an, sich für Beziehungen zu interessieren — vielleicht ist das schon ein Thema, vielleicht noch nicht. Egal wo du stehst, ein paar Grundsätze gelten immer:</p>
<ul><li>Niemand "gehört" dir — weder eine Freundin noch ein Freund</li><li>"Nein" ist ein vollständiger Satz und verdient immer Respekt</li><li>Echte Anziehung hat nichts mit Tricks oder Manipulation zu tun</li><li>Verliebt sein kann großartig sein — und wehtun. Beides ist okay</li></ul>` },
    { type:'quote', text:'Ein starker Mann ist nicht jemand, der andere klein macht. Es ist jemand, der stark genug ist, andere neben sich wachsen zu lassen.' },
    { type:'label', emoji:'✏️', text:'Aktivität: Schwierige Situationen durchspielen' },
    { type:'card', html:`<p>Besprecht diese Situationen als Gedankenexperiment — es gibt keine perfekten Antworten. Es geht darum, zu üben, in solchen Momenten nicht einfach mitzuschwimmen:</p>
<ol><li><strong>In der Schule:</strong> Deine Kumpels machen sich über ein Mädchen lustig. Du findest das nicht okay. Was sagst du?</li>
<li><strong>Online:</strong> Jemand postet ein Meme, das frauenfeindlich ist, und alle lachen. Was tust du?</li>
<li><strong>In der Freundschaft:</strong> Dein bester Freund ist total down, sagt aber "Alles gut." Was machst du?</li>
<li><strong>In der Familie:</strong> Dein Vater sagt etwas über Frauen, das dich stört. Wie gehst du damit um?</li></ol>` },
    { type:'label', emoji:'🪞', text:'Abschluss: Der Werte-Satz' },
    { type:'reflect', label:'Vervollständigt gemeinsam: "Der Mann, der ich sein will, ist jemand, der..."' }
  ]
},

  goal: 'Alle Erkenntnisse zusammenführen und ein persönliches "Survival Kit" für den Alltag entwickeln.',
  blocks: [
    { type:'label', emoji:'🔄', text:'Rückblick' },
    { type:'convo', html:'<strong>Gesprächsimpuls:</strong> Geht die letzten fünf Sessions kurz durch. Was ist hängengeblieben? Was war das Wichtigste? Was hat überrascht?' },
    { type:'label', emoji:'🧰', text:'Dein Medienkompetenz-Toolkit' },
    { type:'collapsible', title:'Werkzeug 1: Der Quellen-Check', html:`<p>Bevor du einen Inhalt glaubst oder teilst:</p>
<ul><li>Wer hat das veröffentlicht? (Person, Medium, Organisation?)</li><li>Gibt es ein Impressum, einen Klarnamen, eine Qualifikation?</li><li>Wird die Behauptung von mehreren unabhängigen Quellen bestätigt?</li><li>Tipp: Nutze Seiten wie <strong>correctiv.org</strong> oder <strong>mimikama.org</strong> für Faktencheck</li></ul>` },
    { type:'collapsible', title:'Werkzeug 2: Das Emotions-Radar', html:`<p>Algorithmen zielen auf deine Emotionen. Mach dir das bewusst:</p>
<ul><li>Wenn du nach dem Scrollen wütend, frustriert oder ängstlich bist — war das der Inhalt oder der Algorithmus?</li><li><strong>Regel:</strong> Bevor du etwas kommentierst, teilst oder glaubst — warte 10 Sekunden. Frag dich: "Würde ich das auch morgen früh noch so sehen?"</li></ul>` },
    { type:'collapsible', title:'Werkzeug 3: Der Perspektiv-Wechsel', html:`<p>Wenn du eine starke Meinung hast, versuche aktiv die Gegenposition zu verstehen:</p>
<ul><li>"Was würde jemand sagen, der das Gegenteil glaubt?"</li><li>"Welche Erfahrungen könnten zu dieser anderen Meinung führen?"</li></ul>
<p>Das heißt nicht, dass du deine Meinung aufgibst. Es heißt, dass du sie stärker machst, weil du sie geprüft hast.</p>` },
    { type:'collapsible', title:'Werkzeug 4: Die Bubble-Brechung', html:`<p>Jeder lebt in einer Blase — auch ohne eigenes Social Media. Brich sie bewusst auf:</p>
<ul><li>Wenn du mal Social Media nutzt: Folge Menschen, die anders denken, aber sachlich argumentieren</li><li>Lies oder schau Nachrichten aus verschiedenen Quellen</li><li>Sprich mit Menschen, die andere Erfahrungen haben als du</li></ul>` },
    { type:'collapsible', title:'Werkzeug 5: Das Hilfe-Netz', html:`<p>Wissen, wo du Hilfe findest, ist kein Zeichen von Schwäche:</p>
<ul><li>Vertrauensperson in der Familie (wer ist das bei euch?)</li><li>Vertrauenslehrer:in in der Schule</li><li><strong>Nummer gegen Kummer:</strong> 116 111 (Mo–Sa 14–20 Uhr, kostenlos, anonym)</li><li><strong>Online-Beratung:</strong> jugendnotmail.de</li><li><strong>Telefonseelsorge:</strong> 0800 111 0 111 (rund um die Uhr, kostenlos)</li><li>Wenn ein Freund sich verändert oder du dir Sorgen machst: Sprich mit einem Erwachsenen, dem du vertraust</li></ul>` },
    { type:'label', emoji:'🧭', text:'Aktivität: Der persönliche Kompass' },
    { type:'activity', title:'Kompass besprechen (20 Min)', html:'<p>Besprecht zusammen vier Richtungen:</p><ul><li><strong>Norden (Werte):</strong> Was sind deine drei wichtigsten Werte?</li><li><strong>Osten (Vorbilder):</strong> Welche 2–3 Menschen inspirieren dich? Was genau an ihnen?</li><li><strong>Süden (Warnsignale):</strong> Was sind deine persönlichen Warnsignale, dass du in eine schlechte Richtung driftest?</li><li><strong>Westen (Hilfe):</strong> An wen wendest du dich, wenn es dir nicht gut geht?</li></ul>' },
    { type:'label', emoji:'❓', text:'Offene Fragen' },
    { type:'card', html:`<p>Dies ist der Moment für alles, was in den letzten Wochen aufgekommen ist. Mögliche Gesprächsstarter:</p>
<ul><li>"Gibt es etwas, das du online gesehen hast und das dich beschäftigt?"</li><li>"Hat sich dein Blick auf irgendetwas verändert?"</li><li>"Was war die schwierigste Frage in diesem Modul?"</li><li>"Worüber möchtest du weiter nachdenken?"</li></ul>` },
    { type:'quote', text:'Du bist kein Produkt und kein Algorithmus. Du bist ein Mensch mit der Freiheit, selbst zu entscheiden, was für dich richtig ist. Nutz diese Freiheit. Hinterfrage. Bleib neugierig. Sei mutig genug, auch mal unsicher zu sein. Das ist keine Schwäche — das ist der Anfang von allem, was sich lohnt.' },
    { type:'label', emoji:'🤝', text:'Abschluss-Ritual' },
    { type:'card', html:'<p>Gebt euch einen Handschlag (oder eine andere Geste, die zu euch passt) und sprecht ein gemeinsames Versprechen aus:</p><p style="text-align:center;font-size:16px;font-weight:700;margin:12px 0;color:var(--accent2)">"Wir bleiben im Gespräch — auch wenn es unbequem wird."</p>' },
    { type:'reflect', label:'Was ist dein wichtigstes Learning aus dem gesamten Modul? Besprecht das zusammen.' },
    { type:'label', emoji:'📚', text:'Ressourcen und Hilfsangebote' },
    { type:'collapsible', title:'Bücher', html:'<ul><li><strong>"Jungen!" von Steve Biddulph</strong> — Ein Klassiker über Jungs-Erziehung, gut lesbar für Eltern</li><li><strong>"Von Jungs für alle" von Jack Urwin</strong> — Über toxische Männlichkeit, verständlich geschrieben</li></ul>' },
    { type:'collapsible', title:'Websites', html:'<ul><li><strong>correctiv.org</strong> — Deutschlands größtes Faktencheck-Team</li><li><strong>mimikama.org</strong> — Überprüfung von Internet-Hoaxes und Fakes</li><li><strong>klicksafe.de</strong> — Medienkompetenz für Jugendliche und Eltern</li><li><strong>jugendschutz.net</strong> — Schutz vor extremistischen Inhalten</li><li><strong>boys-day.de</strong> — Angebote für Jungs jenseits traditioneller Rollenbilder</li></ul>' },
    { type:'collapsible', title:'Hilfsangebote', html:'<ul><li><strong>Nummer gegen Kummer:</strong> 116 111 (Mo–Sa 14–20 Uhr, kostenlos, anonym)</li><li><strong>jugendnotmail.de</strong> — Online-Beratung per Mail</li><li><strong>Telefonseelsorge:</strong> 0800 111 0 111 (rund um die Uhr, kostenlos)</li></ul>' },
    { type:'collapsible', title:'Hinweise für Eltern', html:`<h4>Haltung ist wichtiger als Wissen</h4>
<p>Ihr müsst nicht auf alles eine Antwort haben. Die wichtigste Botschaft: "Ich nehme dich ernst. Ich höre dir zu. Und wir können über alles reden."</p>
<h4>Wenn es stockt</h4>
<p>Nicht jede Session wird perfekt laufen. Wenn ein Gespräch nicht in Gang kommt: Nicht erzwingen. Manchmal wirken Gespräche erst Tage später nach.</p>
<h4>Vorsicht vor Verboten</h4>
<p>"Du darfst dir das nicht anschauen" funktioniert bei 12-Jährigen selten. Besser: "Schau es dir an — und dann lass uns darüber reden, was du davon hältst." Verbotenes wird interessanter. Verstandenes wird langweiliger.</p>
<h4>Regelmäßigkeit</h4>
<p>Dieses Modul ist ein Anfang, kein Endpunkt. Plant regelmäßige Check-ins ein — beim Abendessen, beim Spaziergang, beim Autofahren. Die besten Gespräche entstehen oft nebenbei.</p>` }
  ]
}

let state = loadState();
function loadState() {
  try { const s = JSON.parse(localStorage.getItem(SK)||'{}'); return { completed: s.completed||[], currentSession: null }; }
  catch { return { completed: [], currentSession: null }; }
}
function saveState() { localStorage.setItem(SK, JSON.stringify({ completed: state.completed })); }

function render() {
  const app = document.getElementById('app');
  if (state.currentSession) { app.innerHTML = renderSession(state.currentSession); bindSession(); }
  else { app.innerHTML = renderOverview(); bindOverview(); }
}

function renderOverview() {
  const done = state.completed.length, pct = Math.round((done/sessions.length)*100);
  return `<div class="header"><div class="header-icon">🎭</div><h1>Stark ohne Maske</h1><p>Geschlechtergerechtigkeit, Männlichkeit & Social Media<br>6 Sessions für Eltern und Söhne</p></div>
<div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
<div class="progress-label">${done} von ${sessions.length} Sessions abgeschlossen</div>
<div class="session-list">${sessions.map(s=>{const d=state.completed.includes(s.id);return`<div class="session-card ${d?'completed':''}" data-id="${s.id}" tabindex="0" role="button"><div class="session-num">${d?'✓':s.id}</div><div class="session-info"><div class="session-name">${s.title}</div><div class="session-desc">${s.subtitle}</div></div><div class="session-badge">${d?'🏆':'→'}</div></div>`;}).join('')}</div>
<div class="footer">Stark ohne Maske — LernHub Familie Grimm</div>`;
}

function renderSession(id) {
  const s = sessions.find(x=>x.id===id); if(!s)return'';
  const d = state.completed.includes(s.id);
  return `<button class="back-btn" id="back"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>Übersicht</button>
<div class="session-header"><span class="num-badge">Session ${s.id} von 6</span><h2>${s.title}</h2><div class="goal">${s.goal}</div></div>
${s.blocks.map(renderBlock).join('')}
<button class="complete-btn ${d?'done':''}" id="complete-btn">${d?'✓ Session abgeschlossen':'Session als erledigt markieren'}</button>`;
}

function renderBlock(b) {
  switch(b.type) {
    case 'label': return `<div class="block-label"><span class="emoji">${b.emoji}</span> ${b.text}</div>`;
    case 'card': return `<div class="card">${b.html}</div>`;
    case 'quote': return `<div class="quote">${b.text}</div>`;
    case 'activity': return `<div class="activity"><h3>${b.title}</h3>${b.html}</div>`;
    case 'convo': return `<div class="convo">${b.html}</div>`;
    case 'collapsible': return `<button class="collapsible-toggle" data-col><span>${b.title}</span><span class="arrow">▶</span></button><div class="collapsible-content"><div class="card">${b.html}</div></div>`;
    case 'reflect': return `<div class="reflect-prompt"><strong>Zum Nachdenken:</strong> ${b.label}</div>`;
    default: return '';
  }
}

function bindOverview() {
  document.querySelectorAll('.session-card').forEach(c=>{
    const h=()=>{state.currentSession=+c.dataset.id;render();window.scrollTo(0,0);};
    c.addEventListener('click',h); c.addEventListener('keydown',e=>{if(e.key==='Enter')h();});
  });
}
function bindSession() {
  document.getElementById('back').addEventListener('click',()=>{state.currentSession=null;render();window.scrollTo(0,0);});
  document.querySelectorAll('[data-col]').forEach(btn=>{btn.addEventListener('click',()=>{btn.classList.toggle('open');btn.nextElementSibling.classList.toggle('open');});});
  document.getElementById('complete-btn').addEventListener('click',()=>{const id=state.currentSession;if(!state.completed.includes(id)){state.completed.push(id);saveState();render();window.scrollTo(0,document.body.scrollHeight);}});
}
render();
</script>
