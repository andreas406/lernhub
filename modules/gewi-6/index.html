    info: `<b>Die Europäische Union (EU):</b><br>

  demokratie: {
    title: "Demokratie & Mitbestimmung",
    info: `<b>Was ist Demokratie?</b><br>
    Das Wort kommt aus dem Griechischen: <b>demos</b> = Volk, <b>kratia</b> = Herrschaft → <b>Volksherrschaft</b>. Die erste Demokratie entstand im antiken <b>Athen</b> (ca. 500 v. Chr.) – allerdings durften dort nur freie Männer abstimmen, keine Frauen, Sklaven oder Fremde.<br><br>

    <b>Mitbestimmung in der Schule:</b><br>

    <b>Kinderrechte:</b> Seit 1989 gibt es die <b>UN-Kinderrechtskonvention</b>: Recht auf Bildung, Schutz vor Gewalt, Recht auf Spiel und Freizeit, Recht auf Meinungsäußerung.`,
    questions: [

      {q:"Wo entstand die erste Demokratie?", opts:["Im Römischen Reich","Im antiken Athen","In den USA","In Frankreich"], correct:1, explain:"Die erste Demokratie entstand um 500 v. Chr. im antiken Athen (Griechenland). Allerdings durften dort nur freie, erwachsene Männer abstimmen – Frauen, Sklaven und Fremde waren ausgeschlossen."},
      {q:"Was versteht man unter Gewaltenteilung?", opts:["Die Polizei kontrolliert alles","Die Macht wird auf drei unabhängige Gewalten aufgeteilt","Der Bundeskanzler darf alles allein entscheiden","Gewalt wird unter allen Bürgern aufgeteilt"], correct:1, explain:"Gewaltenteilung bedeutet: Die Staatsgewalt wird auf drei Bereiche verteilt – Legislative (Gesetze machen), Exekutive (Gesetze umsetzen), Judikative (Recht sprechen). So wird Machtmissbrauch verhindert."},

  tourismus: {
    title: "Tourismus & Reisen",
    info: `<b>Geschichte des Reisens:</b><br>

    <b>Arten des Tourismus:</b><br>
    <b>Massentourismus:</b> Viele Touristen an einem Ort (z. B. Mallorca, Rimini). Bringt Geld, kann aber Umwelt und Kultur belasten.<br>
    <b>Sanfter (nachhaltiger) Tourismus:</b> Rücksicht auf Natur, Kultur und Einheimische. Kleine Unterkünfte, regionale Produkte, umweltfreundliche Anreise.<br><br>

    <b>Wirtschaft (+):</b> Arbeitsplätze (Hotels, Restaurants, Reisebüros), Einnahmen für die Region.<br>
    <b>Wirtschaft (–):</b> Abhängigkeit vom Tourismus, schlecht bezahlte Saisonjobs.<br>
    <b>Umwelt (–):</b> Fluglärm, CO₂-Ausstoß, Müll, Wasserverbrauch, Naturzerstörung (Skipisten, Hotelbauten).<br>

      {q:"Was versteht man unter Massentourismus?", opts:["Wenn nur wenige, reiche Menschen reisen","Wenn sehr viele Touristen einen Ort besuchen","Wenn man allein durch die Natur wandert","Wenn man nur im eigenen Land Urlaub macht"], correct:1, explain:"Massentourismus bedeutet, dass sehr viele Touristen gleichzeitig an einen Ort reisen – oft mit Pauschalreisen und Billigflügen. Beliebte Ziele sind z. B. Mallorca oder die türkische Riviera."},
      {q:"Welcher positive wirtschaftliche Effekt hat Tourismus für eine Region?", opts:["Höherer CO₂-Ausstoß","Mehr Müll auf den Straßen","Arbeitsplätze und Einnahmen für die Einheimischen","Verlust lokaler Traditionen"], correct:2, explain:"Tourismus schafft Arbeitsplätze in Hotels, Restaurants, Geschäften und Reisebüros. Die Einnahmen durch Touristen stärken die Wirtschaft der Region."},

      {q:"Welcher Fluss bildet die Grenze zwischen Deutschland und Polen?", opts:["Rhein","Elbe","Donau","Oder"], correct:3, explain:"Die Oder (und ihr Nebenfluss die Neiße) bilden die Grenze zwischen Deutschland und Polen. Diese Grenze wurde 1990 im Zwei-plus-Vier-Vertrag endgültig anerkannt."},
      {q:"In welche Großlandschaft gehört der Schwarzwald?", opts:["Norddeutsches Tiefland","Mittelgebirge","Alpenvorland","Alpen"], correct:1, explain:"Der Schwarzwald in Baden-Württemberg ist ein Mittelgebirge (höchster Punkt: Feldberg, 1.493 m). Weitere Mittelgebirge sind z. B. der Harz, das Erzgebirge und der Thüringer Wald."},
      {q:"Welche drei deutschen Bundesländer sind Stadtstaaten?", opts:["Bayern, Hessen, Sachsen","Berlin, Hamburg, Bremen","Brandenburg, Thüringen, Saarland","Niedersachsen, NRW, Baden-Württemberg"], correct:1, explain:"Berlin, Hamburg und Bremen sind Stadtstaaten – sie sind gleichzeitig Stadt und Bundesland. Berlin ist zudem die Hauptstadt und mit ca. 3,7 Millionen Einwohnern die größte Stadt Deutschlands."}
    ]
  }
};

let currentSection = 'europa';
let sectionState = {};

function initState(key) {
  if (!sectionState[key]) sectionState[key] = {current: 0, score: 0, answered: []};
}

function showSection(key) {
  currentSection = key;
  initState(key);
  const tabs = document.querySelectorAll('.tab');
  const keys = Object.keys(sections);
  tabs.forEach((t,i) => t.classList.toggle('active', keys[i] === key));
  render();
}

function render() {
  const s = sections[currentSection];
  const st = sectionState[currentSection];
  const el = document.getElementById('content');

  if (st.current >= s.questions.length) {
    const pct = Math.round(st.score / s.questions.length * 100);
    let icon = pct === 100 ? '🎉' : pct >= 60 ? '👏' : '💪';
    el.innerHTML = `
      <div class="card" style="text-align:center;padding:40px 20px">
        <div style="font-size:48px;margin-bottom:12px">${icon}</div>
        <h2>${pct === 100 ? 'Perfekt!' : pct >= 60 ? 'Gut gemacht!' : 'Weiter üben!'}</h2>
        <p style="color:#64748b;margin:8px 0 20px">${st.score} von ${s.questions.length} richtig (${pct}%)</p>
        <button class="btn" onclick="resetSection()">Nochmal</button>
      </div>`;
    return;
  }

  const q = s.questions[st.current];
  el.innerHTML = `
    <div class="card">
      <div class="info">${s.info}</div>
    </div>
    <div class="score-bar">
      <span>${s.title}</span>
      <span>Frage ${st.current+1}/${s.questions.length} · <span class="score-val">${st.score} richtig</span></span>
    </div>
    <div class="progress-dots">${s.questions.map((_,i) => {
      let cls = i < st.current ? (st.answered[i] ? 'done' : 'wrong-dot') : i === st.current ? 'current' : '';
      return `<div class="dot ${cls}"></div>`;
    }).join('')}</div>
    <div class="card">
      <div class="question">${q.q}</div>
      <div class="options">${q.opts.map((o,i) => `<button class="opt" onclick="answer(${i})">${o}</button>`).join('')}</div>
      <div class="feedback" id="fb"></div>
    </div>`;
}

function answer(idx) {
  const s = sections[currentSection];
  const st = sectionState[currentSection];
  const q = s.questions[st.current];
  const correct = idx === q.correct;
  if (correct) st.score++;
  st.answered.push(correct);

  document.querySelectorAll('.opt').forEach((o,i) => {
    o.classList.add('disabled');
    if (i === q.correct) o.classList.add('correct');
    if (i === idx && !correct) o.classList.add('wrong');
  });
  const fb = document.getElementById('fb');
  fb.className = `feedback show ${correct ? 'correct' : 'wrong'}`;
  fb.textContent = correct ? '✓ Richtig! ' + q.explain : '✗ ' + q.explain;

  setTimeout(() => { st.current++; render(); }, 1800);
}

function resetSection() {
  sectionState[currentSection] = {current:0, score:0, answered:[]};
  render();
}

showSection('europa');
</script>
</body>
</html>
