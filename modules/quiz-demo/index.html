<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      background: #f8fafc;
      color: #1e293b;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 24px;
    }

    .quiz-container {
      max-width: 600px;
      width: 100%;
    }

    .progress {
      display: flex;
      gap: 6px;
      margin-bottom: 32px;
    }

    .progress .dot {
      flex: 1;
      height: 6px;
      border-radius: 3px;
      background: #e2e8f0;
      transition: background 0.3s;
    }

    .progress .dot.done { background: #22c55e; }
    .progress .dot.wrong { background: #ef4444; }
    .progress .dot.current { background: #3b82f6; }

    .question-num {
      font-size: 14px;
      color: #64748b;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .question {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 28px;
      line-height: 1.3;
    }

    .answers {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .answer-btn {
      display: block;
      width: 100%;
      text-align: left;
      padding: 16px 20px;
      background: white;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      font-size: 17px;
      font-family: inherit;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s, transform 0.1s;
    }

    .answer-btn:active { transform: scale(0.98); }
    .answer-btn:hover { border-color: #3b82f6; }
    .answer-btn.correct { border-color: #22c55e; background: #f0fdf4; }
    .answer-btn.wrong { border-color: #ef4444; background: #fef2f2; }
    .answer-btn.disabled { pointer-events: none; opacity: 0.6; }

    .result {
      text-align: center;
      padding: 40px 0;
    }

    .result .score-icon {
      font-size: 64px;
      margin-bottom: 16px;
    }

    .result .score-text {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .result .score-detail {
      font-size: 16px;
      color: #64748b;
      margin-bottom: 32px;
    }

    .btn {
      display: inline-block;
      padding: 14px 32px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }

    .btn:active { background: #2563eb; }
  </style>
</head>
<body>
  <div class="quiz-container" id="quiz"></div>

  <script>
    const questions = [
      {
        q: "Wie heißt die Hauptstadt von Frankreich?",
        answers: ["Berlin", "Paris", "Madrid", "Rom"],
        correct: 1
      },
      {
        q: "Welcher Planet ist der größte in unserem Sonnensystem?",
        answers: ["Mars", "Saturn", "Jupiter", "Neptun"],
        correct: 2
      },
      {
        q: "Wie viele Kontinente gibt es?",
        answers: ["5", "6", "7", "8"],
        correct: 2
      },
      {
        q: "Welches chemische Element hat das Symbol 'O'?",
        answers: ["Gold", "Osmium", "Sauerstoff", "Eisen"],
        correct: 2
      },
      {
        q: "In welchem Jahr fiel die Berliner Mauer?",
        answers: ["1987", "1989", "1990", "1991"],
        correct: 1
      }
    ];

    let current = 0;
    let score = 0;
    const results = [];
    const container = document.getElementById('quiz');

    function render() {
      if (current >= questions.length) {
        showResult();
        return;
      }

      const q = questions[current];
      container.innerHTML = `
        <div class="progress">
          ${questions.map((_, i) => {
            let cls = '';
            if (i < current) cls = results[i] ? 'done' : 'wrong';
            else if (i === current) cls = 'current';
            return `<div class="dot ${cls}"></div>`;
          }).join('')}
        </div>
        <div class="question-num">Frage ${current + 1} von ${questions.length}</div>
        <div class="question">${q.q}</div>
        <div class="answers">
          ${q.answers.map((a, i) => `
            <button class="answer-btn" data-index="${i}">${a}</button>
          `).join('')}
        </div>
      `;

      container.querySelectorAll('.answer-btn').forEach(btn => {
        btn.addEventListener('click', () => handleAnswer(parseInt(btn.dataset.index)));
      });
    }

    function handleAnswer(index) {
      const q = questions[current];
      const correct = index === q.correct;
      if (correct) score++;
      results.push(correct);

      const buttons = container.querySelectorAll('.answer-btn');
      buttons.forEach((btn, i) => {
        btn.classList.add('disabled');
        if (i === q.correct) btn.classList.add('correct');
        if (i === index && !correct) btn.classList.add('wrong');
      });

      setTimeout(() => {
        current++;
        render();
      }, 800);
    }

    function showResult() {
      const percent = Math.round((score / questions.length) * 100);
      let icon = '🎉';
      let msg = 'Perfekt!';
      if (percent < 100) { icon = '👏'; msg = 'Super gemacht!'; }
      if (percent < 60) { icon = '💪'; msg = 'Weiter üben!'; }
      if (percent < 40) { icon = '📚'; msg = 'Versuch es nochmal!'; }

      container.innerHTML = `
        <div class="result">
          <div class="score-icon">${icon}</div>
          <div class="score-text">${msg}</div>
          <div class="score-detail">${score} von ${questions.length} richtig (${percent}%)</div>
          <button class="btn" onclick="restart()">Nochmal spielen</button>
        </div>
      `;
    }

    function restart() {
      current = 0;
      score = 0;
      results.length = 0;
      render();
    }

    render();
  </script>
</body>
</html>
